<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web前端面试题库</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2ff 100%);
      color: #1f2937;
      line-height: 1.7;
    }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;

      color: #fff;
      padding: 24px 18px 32px;
      box-shadow: 4px 0 18px rgba(15, 23, 42, 0.18);
    }
    .brand {
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.18);
      margin-bottom: 18px;
    }
    .brand h1 { font-size: 22px; line-height: 1.4; margin-bottom: 8px; }
    .brand p { font-size: 12px; color: rgba(255,255,255,0.82); }
    .summary {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .summary-card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .summary-card strong { display: block; font-size: 18px; }
    .summary-card span { font-size: 12px; color: rgba(255,255,255,0.8); }
    .search {
      width: 100%;
      border: none;
      outline: none;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.14);
      color: #fff;
    }
    .search::placeholder { color: rgba(255,255,255,0.72); }
    .chapter {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .chapter-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }
    .chapter.collapsed .chapter-list { display: none; }
    .chapter-list a {
      display: block;
      padding: 8px 14px 8px 20px;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      border-left: 3px solid transparent;
      font-size: 12px;
      transition: all 0.2s ease;
    }
    .chapter-list a:hover,
    .chapter-list a.active {
      background: rgba(255,255,255,0.14);
      border-left-color: #fde68a;
      color: #fff;
    }
    .main {
      margin-left: 340px;
      flex: 1;
      padding: 28px;
    }
    .hero {
      max-width: 1180px;
      margin: 0 auto 22px;
      background: radial-gradient(circle at top left, #ffffff 0%, #eff6ff 100%);
      border: 1px solid #dbeafe;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.08);
    }
    .hero h2 { font-size: 32px; color: #0f172a; margin-bottom: 10px; }
    .hero p { color: #475569; }
    .section {
      max-width: 1180px;
      margin: 0 auto 20px;
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      overflow: hidden;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
    }
    .section-head h3 { font-size: 22px; color: #1d4ed8; }
    .section-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .badge {
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .toggle-icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #eff6ff;
      border-radius: 8px;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      transition: transform 0.2s ease;
    }
    .section.collapsed .toggle-icon { transform: rotate(-90deg); }
    .section.collapsed .section-body { display: none; }
    .qa-card {
      padding: 18px 20px;
      border-bottom: 1px dashed #e5e7eb;
      scroll-margin-top: 80px;
    }
    .qa-card:last-child { border-bottom: none; }
    .qa-card.flash { box-shadow: inset 0 0 0 2px #93c5fd; background: #eff6ff; }
    .qa-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
    }
    .qa-answer {
      white-space: pre-wrap;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 16px;
      color: #334155;
      font-size: 14px;
    }
    .empty {
      max-width: 1180px;
      margin: 20px auto;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 14px;
      padding: 14px 16px;
    }
    @media (max-width: 1100px) {
      .layout { display: block; }
      .sidebar { position: relative; width: 100%; height: auto; }
      .main { margin-left: 0; padding: 16px; }
    }
    @media (max-width: 768px) {
      body { line-height: 1.6; }
      .sidebar { padding: 14px 12px 18px; }
      .brand h1 { font-size: 20px; }
      .brand p { font-size: 13px; }
      .summary-card strong { font-size: 16px; }
      .chapter-title { font-size: 13px; padding: 10px 12px; }
      .chapter-list a { font-size: 13px; padding: 9px 12px 9px 18px; }
      .main { padding: 12px; }
      .hero { padding: 16px; border-radius: 14px; }
      .hero h2 { font-size: 24px; line-height: 1.35; }
      .hero p { font-size: 14px; }
      .section-head { padding: 12px 14px; }
      .section-head h3 { font-size: 18px; }
      .qa-card { padding: 14px; }
      .qa-title { font-size: 16px; margin-bottom: 10px; }
      .qa-answer { font-size: 14px; padding: 12px; }
    }
  </style>
</head>

  <script>
    const DATA = [{"id":"html-browser","title":"HTML 与浏览器","questions":[{"id":"html-browser-1","title":"HTML 语义化标签有哪些，为什么要使用语义化标签？","answer":"直接答案：常见 HTML 语义化标签有 header、nav、main、section、article、aside、footer、figure、figcaption、time、mark。使用语义化标签的原因是：1）提高可读性和可维护性；2）有利于 SEO 抓取；3）提升无障碍访问能力（屏幕阅读器更容易理解页面结构）。\n\n追问准备：\n1. 会直接影响哪些浏览器阶段？\n答案：通常会影响“解析、布局、绘制、合成”中的一个或多个阶段，面试回答建议明确说出受影响阶段。\n2. 处理不好时，页面会出现什么现象？\n答案：常见现象是首屏慢、布局抖动、交互延迟或 SEO 抓取质量下降。"},{"id":"html-browser-2","title":"DOCTYPE 的作用是什么？严格模式和怪异模式有什么区别？","answer":"直接答案：DOCTYPE 用于声明文档类型并告诉浏览器用标准模式解析页面。严格模式遵循 W3C 标准，怪异模式会兼容旧浏览器行为（尤其是盒模型计算差异）。\n\n追问准备：\n1. 你的选型结论是什么？\n答案：我会先给一句选型结论，再补 2 到 3 条差异点，最后结合当前业务规模说明为什么这样选。\n2. 在团队协作里最容易争议的点是什么？\n答案：最常见争议是短期开发效率和长期维护成本的取舍，我会用指标和历史问题数据来做决策。\n3. 会直接影响哪些浏览器阶段？\n答案：通常会影响“解析、布局、绘制、合成”中的一个或多个阶段，面试回答建议明确说出受影响阶段。"},{"id":"html-browser-3","title":"meta 标签有哪些高频用途？","answer":"直接答案：meta 标签有哪些高频用途？ 可按“定义 + 关键点 + 场景”三句直接回答。\n\n追问准备：\n1. 会直接影响哪些浏览器阶段？\n答案：通常会影响“解析、布局、绘制、合成”中的一个或多个阶段，面试回答建议明确说出受影响阶段。\n2. 处理不好时，页面会出现什么现象？\n答案：常见现象是首屏慢、布局抖动、交互延迟或 SEO 抓取质量下降。"},{"id":"html-browser-4","title":"src 和 href 的区别是什么？","answer":"直接答案：src 用于把资源“引入并替换当前标签内容”（如 img/script/iframe），浏览器会下载并执行或渲染该资源；href 用于建立“引用关系”（如 a/link），不会替换当前元素本身内容。\n\n追问准备：\n1. 你的选型结论是什么？\n答案：我会先给一句选型结论，再补 2 到 3 条差异点，最后结合当前业务规模说明为什么这样选。\n2. 在团队协作里最容易争议的点是什么？\n答案：最常见争议是短期开发效率和长期维护成本的取舍，我会用指标和历史问题数据来做决策。\n3. 会直接影响哪些浏览器阶段？\n答案：通常会影响“解析、布局、绘制、合成”中的一个或多个阶段，面试回答建议明确说出受影响阶段。"},{"id":"html-browser-5","title":"script 标签中的 async 和 defer 有什么区别？","answer":"直接答案：async 是脚本下载完就立即执行，执行顺序不保证；defer 是脚本并行下载、在 HTML 解析完成后按顺序执行。业务脚本优先用 defer，统计类脚本常用 async。\n\n追问准备：\n1. 你的选型结论是什么？\n答案：我会先给一句选型结论，再补 2 到 3 条差异点，最后结合当前业务规模说明为什么这样选。\n2. 在团队协作里最容易争议的点是什么？\n答案：最常见争议是短期开发效率和长期维护成本的取舍，我会用指标和历史问题数据来做决策。\n3. 会直接影响哪些浏览器阶段？\n答案：通常会影响“解析、布局、绘制、合成”中的一个或多个阶段，面试回答建议明确说出受影响阶段。"},{"id":"html-browser-6","title":"什么是 DOM？DOM 树是如何构建的？","answer":"直接答案：DOM 是文档对象模型，浏览器把 HTML 解析成树形节点结构，开发者可以通过 DOM API 查询、修改、删除节点。\n\n追问准备：\n1. 第一步会先做什么？\n答案：第一步是明确目标和约束（性能、稳定性、交付周期），不先写代码。\n2. 落地时如何控制风险？\n答案：我会     const navEl = document.getElementById('nav');
    const contentEl = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');

    function normalize(text) {
      return String(text || '').toLowerCase().replace(/s+/g, '');
    }

    function bindNavToggle() {
      document.querySelectorAll('.chapter-title').forEach((node) => {
        node.addEventListener('click', () => {
          const wrapper = node.closest('.chapter');
          if (wrapper) wrapper.classList.toggle('collapsed');
        });
      });
    }

    function bindSectionToggle() {
      document.querySelectorAll('.section-head').forEach((node) => {
        node.addEventListener('click', () => {
          const wrapper = node.closest('.section');
          if (wrapper) wrapper.classList.toggle('collapsed');
        });
      });
    }

    function setActiveLink(id) {
      document.querySelectorAll('.chapter-list a.active').forEach((link) => link.classList.remove('active'));
      const current = document.querySelector('.chapter-list a[href="#' + id + '"]');
      if (current) current.classList.add('active');
    }

    function bindQuestionJump() {
      document.querySelectorAll('.chapter-list a').forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();
          const href = link.getAttribute('href');
          if (!href) return;
          const target = document.querySelector(href);
          if (!target) return;
          const section = target.closest('.section');
          if (section) section.classList.remove('collapsed');
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          setActiveLink(href.slice(1));
          target.classList.add('flash');
          window.setTimeout(() => target.classList.remove('flash'), 1400);
        });
      });
    }

    function bindScrollSpy() {
      const cards = Array.from(document.querySelectorAll('.qa-card'));
      if (!cards.length) return;
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) setActiveLink(entry.target.id);
        });
      }, { threshold: 0.35 });
      cards.forEach((card) => observer.observe(card));
    }

    function render(data) {
      if (!data.length) {
        navEl.innerHTML = '<div class="empty">没有匹配到题目，请尝试其他关键词。</div>';
        contentEl.innerHTML = '<div class="empty">没有匹配到题目，请尝试其他关键词。</div>';
        return;
      }

      navEl.innerHTML = data.map((section) => {
        const links = section.questions.map((q, index) => {
          return '<a href="#' + q.id + '">' + (index + 1) + '. ' + q.title + '</a>';
        }).join('');

        return '<div class="chapter collapsed">'
          + '<div class="chapter-title">'
          + '<span>' + section.title + '（' + section.count + '）</span>'
          + '<span>▼</span>'
          + '</div>'
          + '<div class="chapter-list">' + links + '</div>'
          + '</div>';
      }).join('');

      contentEl.innerHTML = data.map((section) => {
        const list = section.questions.map((q, index) => {
          const answer = q.answer.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return '<article class="qa-card" id="' + q.id + '">'
            + '<h4 class="qa-title">' + (index + 1) + '. ' + q.title + '</h4>'
            + '<div class="qa-answer">' + answer + '</div>'
            + '</article>';
        }).join('');

        return '<section class="section" id="section-' + section.id + '">'
          + '<div class="section-head">'
          + '<h3>' + section.title + '</h3>'
          + '<div class="section-meta">'
          + '<span class="badge">' + section.count + ' 题</span>'
          + '<span class="toggle-icon">v</span>'
          + '</div>'
          + '</div>'
          + '<div class="section-body">' + list + '</div>'
          + '</section>';
      }).join('');

      bindNavToggle();
      bindSectionToggle();
      bindQuestionJump();
      bindScrollSpy();
    }

    function filterData(keyword) {
      const trimmed = normalize(keyword);
      if (!trimmed) return DATA;
      return DATA.map((section) => {
        const questions = section.questions.filter((q) => normalize(q.title + q.answer).includes(trimmed));
        return { ...section, questions, count: questions.length };
      }).filter((section) => section.count > 0);
    }

    render(DATA);
    searchInput.addEventListener('input', (event) => {
      render(filterData(event.target.value));
    });
  </script>
