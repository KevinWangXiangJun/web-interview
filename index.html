    <!-- 保存所有的题库数据，一行不落 -->
    <textarea id="raw-data" style="display:none;">
        一、HTML 与浏览器
        1. HTML 语义化标签有哪些，为什么要使用语义化标签？
        【核心定义】根据内容含义选择合适标签（如 article、nav、header），而非全部使用 div。
        【底层原理】1. SEO优化：爬虫依赖标签语义判断权重，h1 远高于 div.title。2. 无障碍访问：屏幕阅读器通过语义识别区域功能。3. 代码维护：结构清晰，降低协作成本。
        【代码示例】
        <header>页眉</header>
        <nav>导航</nav>
        <main>主内容</main>
        <article>独立文章</article>
        <aside>侧边栏</aside>
        <footer>页脚</footer>
        【注意事项】避免“div走天下”；不为样式滥用语义标签；确保文档大纲逻辑清晰。

        2. DOCTYPE 的作用是什么？严格模式和怪异模式有什么区别？
        【核心定义】声明文档类型，告知浏览器使用哪种 HTML 规范解析。
        【底层原理】严格模式遵循 W3C 标准，盒模型 width = content；怪异模式兼容旧浏览器，width = content + padding + border。
        【代码示例】 <!DOCTYPE html> <!-- 必须放在第一行，前无空格/BOM -->
        【注意事项】缺少 DOCTYPE 或位置错误会触发怪异模式，导致布局错乱；现代开发统一使用严格模式。
        
        3. meta 标签有哪些高频用途？
        【核心定义】提供文档元数据，不显示在页面，影响浏览器行为、SEO与安全。
        【底层原理】控制编码、视口、搜索引擎抓取、社交分享卡片、内容安全策略等。
        【代码示例】
        <meta charset="UTF-8"> <!-- 必须放 head 最前 -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="页面描述">
        <meta name="robots" content="noindex, nofollow">
        <meta property="og:title" content="分享标题">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
        <meta name="theme-color" content="#ffffff">
        【注意事项】charset 必须首个声明；viewport 是移动端基础；CSP 建议配合服务端响应头。

        4. src 和 href 的区别是什么？
        【核心定义】两者都是资源链接，但用途、加载行为与对文档流影响不同。
        【底层原理】src 引入并替换当前元素内容，下载执行时阻塞解析；href 建立引用关系，并行下载不阻塞解析。
        【代码示例】
        <script src="app.js"></script> <!-- 阻塞解析 -->
        <link rel="stylesheet" href="style.css"> <!-- 不阻塞解析，阻塞渲染 -->
        【注意事项】业务 JS 优先用 defer；CSS 放 head 确保渲染树尽早构建。

        5. script 标签中的 async 和 defer 有什么区别？
        【核心定义】控制外部脚本的加载与执行时机，避免阻塞 HTML 解析。
        【底层原理】async 下载完立即执行，顺序不保证；defer 并行下载，HTML 解析完后按顺序执行。
        【代码示例】
        <script src="stat.js" async></script> <!-- 统计/广告 -->
        <script src="app.js" defer></script> <!-- 业务主逻辑 -->
        【注意事项】业务脚本默认 defer；第三方独立脚本用 async；type="module" 默认 defer。
        
        6. 什么是 DOM？DOM 树是如何构建的？
        【核心定义】文档对象模型，浏览器将 HTML 解析成的树形节点结构。
        【底层原理】字节流 → 字符流（解码）→ 令牌（词法分析）→ 节点（语法分析）→ DOM 树。遇到同步 script 会暂停构建。
        【代码示例】
        StartTag: <div class="box">
        EndTag: </div>
        TextNode: 内容文本
        连接成树状结构
        【注意事项】document.write() 会重写文档流，严禁使用；DOM 操作同步，频繁操作阻塞主线程。
        
        7. 什么是 BOM？常见 BOM 对象有哪些？
        【核心定义】浏览器对象模型，提供与窗口交互的接口，无统一标准。
        【底层原理】通过 window 全局对象暴露浏览器环境信息与控制能力。
        【代码示例】
        window.location.href // 跳转
        window.history.pushState({}, '', '/new') // 无刷新改URL
        window.navigator.userAgent // 浏览器标识
        window.screen.width // 屏幕宽度
        【注意事项】避免直接改 location.href 跳转；userAgent 检测不可靠，优先特性检测。
        
        8. 从输入 URL 到页面展示，中间发生了什么？
        【核心定义】涵盖网络、解析、渲染、执行四大阶段的完整流程。
        【底层原理】DNS解析 → TCP/TLS握手 → HTTP请求 → 服务端响应 → HTML解析建DOM → CSS解析建CSSOM → 合并渲染树 → 布局 → 绘制 → 合成 → JS执行与交互。
        【代码示例】
        网络：DNS → 握手 → 请求 → 响应
        渲染：DOM+CSSOM → RenderTree → Layout → Paint → Composite
        执行：同步代码 → 微任务 → 渲染 → 宏任务
        【注意事项】减少DNS查询；启用HTTP/2；关键CSS内联；JS用defer；图片指定宽高防抖动。
        
        9. 浏览器的渲染流程是什么？
        【核心定义】浏览器将 HTML/CSS 转换为像素并显示的过程。
        【底层原理】DOM+CSSOM → 渲染树（剔除display:none）→ Layout计算位置大小 → Paint填充像素 → Composite分层合成提交GPU。
        【代码示例】
        Render Tree 仅含可见节点
        Layout 受 width/height/margin/font-size 影响
        Paint 受 color/background/visibility 影响
        Composite 受 transform/opacity 影响
        【注意事项】优先触发 Composite；避免“读-写-读-写”强制同步布局；批量修改DOM。
        
        10. 重排和重绘分别是什么？如何减少重排和重绘？
        【核心定义】重排是布局变化重新计算，代价高；重绘是外观变化不影响布局，代价低。
        【底层原理】重排必触发重绘。读取布局属性（offsetTop等）会强制刷新队列。transform/opacity 走合成层跳过两者。
        【代码示例】
        // 批量操作
        const frag = document.createDocumentFragment();
        for(let i=0; i<100; i++) frag.appendChild(document.createElement('li'));
        ul.appendChild(frag); // 仅1次重排
        // 动画优化
        .box { transition: transform 0.3s, opacity 0.3s; }
        【注意事项】will-change 提前创建合成层，但勿滥用；动画结束移除 will-change。
        
        11. 浏览器缓存有哪些类型？强缓存和协商缓存有什么区别？
        【核心定义】强缓存直接读本地不发请求；协商缓存发请求验证是否变更。
        【底层原理】强缓存靠 Expires/Cache-Control；协商缓存靠 ETag/If-None-Match 或 Last-Modified/If-Modified-Since。ETag 优先级高且精准。
        【代码示例】
        Cache-Control: max-age=31536000, immutable // 静态资源
        Cache-Control: no-cache, must-revalidate // HTML文件
        ETag: "abc123" → 304 Not Modified
        【注意事项】强缓存优先；用户强制刷新跳过所有缓存；策略需配合CDN。
        
        12. Cookie、localStorage、sessionStorage 的区别是什么？
        【核心定义】三种客户端存储方案，生命周期、通信方式、安全性不同。
        【底层原理】Cookie 随请求发送容量小；localStorage 永久仅客户端；sessionStorage 会话级同标签页隔离。
        【代码示例】
        // 登录态
        Set-Cookie: token=abc; HttpOnly; Secure; SameSite=Strict
        // 偏好设置
        localStorage.setItem('theme', 'dark');
        // 临时数据
        sessionStorage.setItem('step1', JSON.stringify(data));
        【注意事项】敏感信息禁存 localStorage；Cookie 设 SameSite 防 CSRF；大数据操作避免阻塞主线程。
        
        13. 浏览器事件循环在页面渲染中扮演什么角色？
        【核心定义】JS 单线程调度异步任务的机制，决定渲染时机与执行顺序。
        【底层原理】同步代码 → 清空微任务队列 → 渲染时机 → 执行1个宏任务 → 循环。微任务优先级高于渲染。
        【代码示例】
        console.log('1');
        setTimeout(() => console.log('2'), 0);
        Promise.resolve().then(() => console.log('3'));
        console.log('4');
        // 输出：1 → 4 → 3 → 2
        【注意事项】避免微任务队列过长阻塞渲染；requestAnimationFrame 在渲染前执行适合动画。
        
        14. 为什么图片、脚本、样式会影响页面首屏加载？
        【核心定义】三类资源通过阻塞解析、占用带宽、触发重排影响首屏指标。
        【底层原理】图片体积大无尺寸致抖动；脚本同步执行阻塞解析；样式阻塞渲染树构建。
        【代码示例】
        <img loading="lazy" width="800" height="600">
        <script src="app.js" defer></script>
        <link rel="preload" as="style" href="non-critical.css" onload="this.rel='stylesheet'">
        【注意事项】首屏关键资源优先；非关键延迟/异步；用 Lighthouse 测 LCP/FCP。

        15. 前端如何做 SEO 优化？
        【核心定义】通过技术手段提升页面在搜索引擎的收录质量与排名。
        【底层原理】语义结构+标题描述+服务端可读内容+站点地图+性能指标+安全合规。
        【代码示例】
        <title>含关键词的唯一标题</title>
        <meta name="description" content="150字摘要">
        使用 SSR/SSG 保证爬虫抓取完整HTML
        提交 sitemap.xml 与 robots.txt
        【注意事项】避免 display:none 隐藏重要内容；确保水合一致；关注 Core Web Vitals。

        16. 什么是同源策略？浏览器为什么要限制跨域？
        【核心定义】协议、域名、端口三者相同才允许脚本互访。
        【底层原理】防止恶意站点窃取用户在其他站点的敏感数据，实现安全隔离。
        【代码示例】
        ✅ 同源：https://a.com → https://a.com
        ❌ 跨域：协议/域名/端口任一不同
        <script src="https://cdn.com/lib.js"> 可加载，但读取内容受CORS限制
        【注意事项】跨域加载资源允许，读取内容受控；生产环境正确配置 CORS。

        17. iframe 有哪些优缺点和使用场景？
        【核心定义】嵌入另一个 HTML 文档，创建独立浏览上下文。
        【底层原理】隔离上下文但阻塞 onload，通信需 postMessage，性能开销大。
        【代码示例】
        <iframe src="https://third.com" loading="lazy" sandbox="allow-scripts"></iframe>
        // 跨域通信
        iframe.contentWindow.postMessage({type:'LOGIN'}, 'https://third.com');
        window.addEventListener('message', e => { if(e.origin==='https://third.com') ... });
        【注意事项】必须验证 e.origin 防 XSS；移动端慎用；避免嵌套过深。

        18. 浏览器的事件捕获、冒泡和事件委托分别是什么？
        【核心定义】事件传播三阶段及利用冒泡优化绑定的技术。
        【底层原理】捕获自上而下，目标阶段，冒泡自下而上（默认）。委托将子事件绑父元素，利用冒泡减少监听器。
        【代码示例】
        ul.addEventListener('click', e => {
        const li = e.target.closest('li');
        if (li && ul.contains(li)) { /* 处理 */ }
        });
        【注意事项】focus/blur 不冒泡，用 focusin/focusout；需判断 e.target 防误触发。

        19. 什么是懒加载和预加载？
        【核心定义】按需加载与提前准备的资源加载策略。
        【底层原理】懒加载进视口才加载；预加载提示浏览器优先下载未来资源。
        【代码示例】
        <img data-src="large.jpg" loading="lazy" width="800" height="600">
        <link rel="preload" href="font.woff2" as="font" crossorigin>
        <link rel="prefetch" href="/next-page">
        【注意事项】懒加载必指定宽高防抖动；preload 的 as 必须匹配资源类型；避免过度预加载。

        20. Web Worker、Service Worker 分别解决什么问题？
        【核心定义】两种后台线程方案，解决主线程阻塞与离线能力。
        【底层原理】Worker 执行密集计算不阻塞 UI，无法操作 DOM；SW 作网络代理拦截请求实现离线缓存，必须 HTTPS。
        【代码示例】
        // Worker
        const w = new Worker('calc.js');
        w.postMessage(data);
        w.onmessage = e => console.log(e.data);
        // SW 注册
        navigator.serviceWorker.register('/sw.js');
        【注意事项】Worker 避免频繁 postMessage；SW 需版本管理与缓存清理策略。

        21. 浏览器进程、渲染进程、线程之间是什么关系？
        【核心定义】现代浏览器多进程架构，隔离风险提升稳定性。
        【底层原理】浏览器进程管全局；每标签页1个渲染进程，含主线程（JS/渲染）、合成线程（GPU合成）、Worker线程等。JS与渲染共用主线程。
        【代码示例】
        主线程：事件循环、样式计算、布局、绘制
        合成线程：transform/opacity 动画，不阻塞主线程
        【注意事项】长任务阻塞页面；动画优先 transform/opacity；减少图层数量控内存。

        22. 前端如何理解可访问性（a11y）？
        【核心定义】确保残障人士可使用网站的产品设计原则。
        【底层原理】语义HTML+键盘导航+ARIA补充+色彩对比+验证工具。
        【代码示例】
        <button aria-label="关闭">×</button>
        <label for="email">邮箱</label><input id="email">
        .skip-link:focus { top: 0; } /* 键盘可见 */
        【注意事项】ARIA 是补充，优先原生标签；测试关闭鼠标仅用键盘；定期 Lighthouse 审计。

        二、CSS 样式与布局

        1. CSS 选择器优先级是如何计算的？
        【核心定义】权重越高优先级越高，按 (内联, ID, 类, 元素) 逐位比较。
        【底层原理】!important > 内联(1,0,0,0) > ID(0,1,0,0) > 类/伪类/属性(0,0,1,0) > 元素/伪元素(0,0,0,1)。权重相同后写覆盖先写。
        【代码示例】
        #nav .item:hover /* (0,1,2,0) */
        div.container p /* (0,0,1,2) */
        【注意事项】避免 !important；组合器不增权重；继承样式优先级为0。

        2. display: none 与 visibility: hidden 的区别是什么？
        【核心定义】两者隐藏元素，但对文档流与渲染影响不同。
        【底层原理】none 脱离流不占位，触发重排重绘，子元素不可见；hidden 保留占位仅重绘，子元素可设 visible 显示。
        【代码示例】
        .hide-flow { display: none; }
        .hide-vis { visibility: hidden; }
        【注意事项】需释放空间用 none；保留占位+动画过渡用 visibility+opacity。

        3. position 的几个取值分别有什么特点？
        【核心定义】控制元素定位方式与参考坐标系。
        【底层原理】static 默认流；relative 相对自身不脱流；absolute 相对最近非static祖先脱流；fixed 相对视口；sticky 阈值前 relative 后 fixed。
        【代码示例】
        .abs { position: absolute; top: 10px; } /* 无定位祖先则相对html */
        .stick { position: sticky; top: 0; } /* 需父元素可滚动 */
        【注意事项】absolute 需指定 top/left 等才生效；sticky 父元素不能 overflow:hidden。

        4. BFC 是什么？哪些方式可以触发 BFC？
        【核心定义】块级格式化上下文，隔离内部布局不受外部影响。
        【底层原理】满足其一：根元素、float非none、position absolute/fixed、display inline-block/table-cell/flex/grid/flow-root、overflow非visible。
        【代码示例】
        .bfc { overflow: hidden; } /* 触发BFC清浮动/防margin合并 */
        【注意事项】BFC 内 margin 不合并；两栏布局左浮动右触发 BFC。

        5. flex 布局的常见属性有哪些？
        【核心定义】一维布局模型，高效排列容器内子元素。
        【底层原理】容器控制主轴/交叉轴方向与对齐；子项控制伸缩比例与顺序。
        【代码示例】
        .container { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .item { flex: 1; } /* 等分 */
        .sidebar { flex: 0 0 200px; } /* 固定 */
        【注意事项】flex 简写顺序为 grow shrink basis；避免 flex:1 在 IE11 兼容问题。

        6. grid 布局适合解决什么问题？
        【核心定义】二维布局模型，同时控制行与列。
        【底层原理】定义行列模板、间距、区域命名，fr 单位分配剩余空间。
        【代码示例】
        .grid { display: grid; grid-template-columns: 200px 1fr 2fr; gap: 20px; }
        .header { grid-column: 1 / 4; }
        【注意事项】适合整体架构/仪表盘；复杂嵌套时注意性能。

        7. 盒模型是什么？content-box 和 border-box 的区别是什么？
        【核心定义】元素占据空间由 Content+Padding+Border+Margin 组成。
        【底层原理】content-box 宽度仅含内容；border-box 宽度含内容+内边距+边框。
        【代码示例】
        *, *::before, *::after { box-sizing: border-box; }
        【注意事项】全局启用 border-box 布局更可控；width 计算不再需手动加减 padding/border。

        8. 如何实现水平垂直居中？
        【核心定义】让子元素在父容器内水平+垂直居中。
        【底层原理】弹性居中、网格居中、绝对定位位移、已知尺寸自动外边距、表格兼容。
        【代码示例】
        .flex-center { display: flex; justify-content: center; align-items: center; }
        .grid-center { display: grid; place-items: center; }
        .abs-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        【注意事项】transform 居中不依赖父元素尺寸；已知尺寸可用 margin:auto。

        9. 清除浮动有哪些方法？
        【核心定义】解决浮动导致父元素高度塌陷。
        【底层原理】伪元素生成空块级元素清除；触发 BFC 包含浮动；额外标签污染 DOM 不推荐。
        【代码示例】
        .clearfix::after { content: ""; display: table; clear: both; }
        .parent { overflow: hidden; } /* BFC方案 */
        【注意事项】优先 clearfix；overflow:hidden 可能裁剪溢出内容。

        10. px、em、rem、vw、vh 分别适用于什么场景？
        【核心定义】CSS 长度单位，基准不同适用场景不同。
        【底层原理】px 固定；em 相对父字体（嵌套复合）；rem 相对根字体；vw/vh 相对视口。
        【代码示例】
        html { font-size: 16px; }
        .box { width: 3.75rem; } /* 60px */
        .full { width: 100vw; height: 100vh; }
        【注意事项】移动端 100vh 有地址栏问题；rem 需配合 flexible 或插件；em 嵌套易失控。

        11. 什么是响应式布局？常见实现方式有哪些？
        【核心定义】页面自动适应不同屏幕尺寸。
        【底层原理】媒体查询断点、流式百分比、Flex/Grid 伸缩、rem/vw 适配。
        【代码示例】
        @media (max-width: 768px) { .nav { flex-direction: column; } }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; }
        【注意事项】移动优先（min-width 增强）；测试主流机型；避免固定宽度。

        12. CSS 中的层叠、继承、优先级如何理解？
        【核心定义】决定样式最终生效的三大机制。
        【底层原理】层叠按优先级+来源顺序；继承自动获取父级部分属性（color/font）；优先级按权重计算。
        【代码示例】
        继承：color, font-size, visibility
        不继承：width, margin, padding, border
        【注意事项】布局属性不继承；优先级相同时后写覆盖；!important 破坏层叠谨慎使用。

        13. 伪类和伪元素有什么区别？
        【核心定义】扩展选择器能力，作用对象不同。
        【底层原理】伪类表状态（单冒号）；伪元素创建虚拟节点（双冒号）。
        【代码示例】
        :hover, :focus, :nth-child(2) /* 伪类 */
        ::before, ::after, ::first-line /* 伪元素，需 content 属性 */
        【注意事项】伪元素必须设 content；CSS3 规范推荐双冒号区分。

        14. transition 和 animation 的区别是什么？
        【核心定义】两者实现动画，触发方式与控制能力不同。
        【底层原理】transition 需状态触发仅起止态；animation 可自动执行，@keyframes 控制多帧，支持循环/方向。
        【代码示例】
        .btn { transition: background 0.3s; }
        .spin { animation: rotate 1s linear infinite; }
        @keyframes rotate { to { transform: rotate(360deg); } }
        【注意事项】简单交互用 transition；复杂多帧用 animation；动画属性优先 transform/opacity。

        15. 如何实现三角形、阴影、渐变、毛玻璃效果？
        【核心定义】纯 CSS 实现常见视觉效果。
        【底层原理】border 透明技巧、box-shadow 偏移模糊、linear/radial-gradient 填充、backdrop-filter 模糊背景。
        【代码示例】
        .triangle { width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-bottom:20px solid #333; }
        .shadow { box-shadow: 2px 4px 8px rgba(0,0,0,0.2); }
        .gradient { background: linear-gradient(to right, #ff6b6b, #4ecdc4); }
        .glass { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        【注意事项】毛玻璃需浏览器支持；三角形利用 border 交界特性；阴影注意性能开销。

        16. 如何理解 CSS 中的包含块和格式化上下文？
        【核心定义】布局基础概念，决定定位参考与排列规则。
        【底层原理】包含块是定位坐标系；格式化上下文是布局环境规则集合，不同 FC 互不影响。
        【代码示例】
        absolute 参考最近非static祖先 padding区
        fixed 参考视口
        BFC/IFC/FFC/GFC 隔离布局
        【注意事项】定位计算依赖包含块；跨 FC 布局需显式控制。

        17. 为什么有时设置 z-index 不生效？
        【核心定义】z-index 仅在同一层叠上下文内比较。
        【底层原理】static 无效；父级创建新上下文限制子级；不同上下文无法直接比较。
        【代码示例】
        创建上下文：position+z-index, opacity<1, transform, filter, display:flex/grid+z-index, will-change, contain
        【注意事项】排查顺序：查 position → 查父级上下文 → DevTools 看层叠顺序；避免滥用 9999。

        18. 如何设计一套可维护的 CSS 架构？
        【核心定义】通过规范、组织、工具提升可读性与可维护性。
        【底层原理】命名约定、文件分层、工具链选择、原则约束。
        【代码示例】
        BEM: .card__title--active
        目录: variables, mixins, reset, components, layout, utils
        原则: 避免!important, 嵌套≤3层
        【注意事项】按需选 Sass/Modules/Tailwind/CSS-in-JS；注释关键逻辑。

        19. 移动端适配常见方案有哪些？
        【核心定义】让页面在不同尺寸设备正常显示。
        【底层原理】视口+根字体动态计算、直接使用视口单位、媒体查询断点、弹性分配。
        【代码示例】
        JS设 html font-size → CSS用 rem
        postcss-px-to-viewport 转 vw
        @media 断点增强
        【注意事项】移动优先；测试主流机型；100vh 处理地址栏；Flex 辅助内部布局。

        20. CSS 性能优化可以从哪些方面入手？
        【核心定义】减少浏览器解析、计算、渲染 CSS 的开销。
        【底层原理】选择器效率、渲染属性选择、加载策略优化。
        【代码示例】
        .nav .item 优于 div ul li a /* 浏览器从右向左解析 */
        .anim { transition: transform 0.3s; } /* 触发合成层 */
        关键CSS内联，非关键异步
        【注意事项】移除未使用 CSS；压缩文件；will-change 谨慎使用。

        21. 如何避免样式污染和命名冲突？
        【核心定义】防止不同模块/组件 CSS 相互影响。
        【底层原理】命名约定、构建哈希隔离、作用域属性、原生隔离、动态生成。
        【代码示例】
        CSS Modules: .title__a1b2
        Scoped: [data-v-xxx] .title
        Shadow DOM: 完全隔离
        CSS-in-JS: 样式绑定组件
        【注意事项】组件库 Modules+BEM；业务项目 Tailwind/Modules；避免全局样式。

        22. Tailwind、CSS Modules、Sass、Styled Components 各自适合什么场景？
        【核心定义】四种主流 CSS 方案，理念与适用场景不同。
        【底层原理】原子类快速开发、局部作用域隔离、预处理器功能强大、样式即代码动态绑定。
        【代码示例】
        Tailwind: class="flex p-4 bg-blue-500"
        Modules: import styles from './a.module.css'
        Sass: $primary: #007bff; @mixin btn { ... }
        Styled: const Btn = styled.button`...`
        【注意事项】新项目优先 Tailwind；组件库 Modules+Sass；React 动态 UI 用 Styled Components。

        三、JavaScript 核心与进阶
        1. JavaScript 的数据类型有哪些？
        【核心定义】分为基本类型（栈内存，按值访问）与引用类型（堆内存，按引用访问）。
        【底层原理】基本类型：String/Number/Boolean/Null/Undefined/Symbol(ES6)/BigInt(ES2020)。引用类型：Object及其子类（Array/Function/Date/RegExp/Map/Set等）。栈存值，堆存对象引用地址。
        【代码示例】
        typeof 'str' // "string"
        typeof null // "object" (历史遗留bug)
        Array.isArray([]) // true
        Object.prototype.toString.call([]) // "[object Array]"
        【注意事项】判断数组用Array.isArray；判断对象结合typeof与非空检查；Symbol用于唯一标识，BigInt用于超大整数计算。
        
        2. typeof 和 instanceof 的区别是什么？
        【核心定义】类型判断的两种机制，原理与适用场景不同。
        【底层原理】typeof返回类型标签，速度快但null返回object且无法区分数组；instanceof检查原型链，适合对象/自定义类，跨iframe/窗口失效。
        【代码示例】
        [] instanceof Array // true (同窗口)
        typeof [] === 'object' // true
        function isObj(v) { return v !== null && typeof v === 'object'; }
        【注意事项】跨域环境instanceof不可靠；基础类型用typeof；复杂对象用Object.prototype.toString或专用API。
        
        3. 闭包是什么？闭包的应用场景有哪些？
        【核心定义】函数有权访问定义时所在作用域的变量，即使外部函数已执行完毕。
        【底层原理】JS引擎将变量环境保留在内存中，内部函数持有外部变量引用。形成“函数+词法作用域”组合。
        【代码示例】
        function createCounter() {
        let count = 0; // 私有变量
        return { inc: () => ++count, get: () => count };
        }
        【注意事项】滥用导致内存泄漏；及时解除引用；应用于数据私有化/防抖节流/柯里化/迭代器状态保存。
        什么是事件循环？宏任务和微任务有哪些？
        【核心定义】JS单线程处理异步任务的调度机制。
        【底层原理】同步代码 → 清空微任务队列(Promise/MutationObserver/queueMicrotask) → 渲染时机 → 执行1个宏任务(setTimeout/I/O/UI事件) → 循环。微任务优先级高于渲染。
        【代码示例】
        console.log(1); setTimeout(()=>console.log(2),0); Promise.resolve().then(()=>console.log(3)); console.log(4);
        // 输出: 1 4 3 2
        【注意事项】微任务过长阻塞渲染；requestAnimationFrame在渲染前执行；避免在微任务中频繁修改DOM。
        原型、原型链、继承分别是什么？
        【核心定义】基于原型的对象继承机制。
        【底层原理】实例.__proto__指向构造函数.prototype。属性查找沿原型链向上至null。继承方案从原型链/构造函数到寄生组合式(最优)，ES6 class为语法糖。
        【代码示例】
        function inherit(Child, Parent) {
        Child.prototype = Object.create(Parent.prototype);
        Child.prototype.constructor = Child;
        }
        class Child extends Parent { constructor(){super();} }
        【注意事项】避免直接修改.proto；寄生组合继承避免调用两次父类构造；class继承必须调用super()。
        Promise 的状态和常用 API 有哪些？
        【核心定义】异步编程解决方案，代表未来才会知道的结果。
        【底层原理】状态Pending→Fulfilled/Rejected不可逆。then链式调用返回新Promise。静态方法all/race/allSettled/any控制并发与竞速。
        【代码示例】
        Promise.all([p1, p2]).then(res => console.log(res));
        Promise.race([p1, p2]).then(first => console.log(first));
        Promise.allSettled([p1, p2]).then(results => console.log(results));
        【注意事项】始终catch错误；避免嵌套地狱用async/await；allSettled适合全部完成不管成败的场景。
        async/await 的本质是什么？
        【核心定义】Generator函数+自动执行器的语法糖，异步代码同步化书写。
        【底层原理】async返回Promise；await暂停执行等待决议，将结果赋变量。错误用try/catch捕获。
        【代码示例】
        async function getData() {
        try {
        const res = await fetch('/api');
        return await res.json();
        } catch(e) { console.error(e); }
        }
        【注意事项】await必须在async内；并行请求用Promise.all包裹await；避免顶层await阻塞模块加载。
        浅拷贝和深拷贝的区别是什么？
        【核心定义】拷贝层级不同。浅拷贝仅第一层，引用类型共享地址；深拷贝递归完全独立。
        【底层原理】浅拷贝：Object.assign/展开运算符。深拷贝：JSON序列化(丢函数/循环引用)/structuredClone(现代API)/递归+WeakMap。
        【代码示例】
        const deep = structuredClone(obj); // 推荐
        function deepClone(obj, map=new WeakMap()) {
        if(obj===null||typeof obj!=='object') return obj;
        if(map.has(obj)) return map.get(obj);
        const copy = Array.isArray(obj)?[]:{};
        map.set(obj, copy);
        for(let k in obj) copy[k]=deepClone(obj[k], map);
        return copy;
        }
        【注意事项】JSON方法无法拷贝函数/undefined/Symbol/循环引用；WeakMap防循环引用死递归；注意Symbol属性需Reflect.ownKeys遍历。
        如何手写防抖和节流？
        【核心定义】控制高频函数执行频率。
        【底层原理】防抖：n秒内仅最后一次执行（清空重设定时器）。节流：n秒内仅第一次执行（时间戳/定时器控制）。
        【代码示例】
        // 防抖
        function debounce(fn, delay) {
        let t; return (...args) => { clearTimeout(t); t=setTimeout(()=>fn.apply(this,args), delay); };
        }
        // 节流(时间戳)
        function throttle(fn, delay) {
        let last=0; return (...args) => { const now=Date.now(); if(now-last>=delay){last=now;fn.apply(this,args);} };
        }
        【注意事项】防抖适合搜索输入；节流适合滚动/resize；注意this指向与参数传递；可加immediate/trailing选项。
        JavaScript 中如何实现并发控制？
        【核心定义】限制同时执行的异步任务数量。
        【底层原理】维护运行计数与等待队列。未达上限直接执行，否则入队；任务完成递减计数并触发队列下一项。
        【代码示例】
        class Scheduler {
        constructor(limit){this.limit=limit;this.running=0;this.queue=[];}
        add(task){return new Promise(resolve=>{
        const exec=async()=>{this.running++;try{await task();}finally{this.running--;resolve();this.next();}};
        if(this.running<this.limit) exec(); else this.queue.push(exec);
        });}
        next(){const t=this.queue.shift(); if(t) t();}
        }
        【注意事项】适用于图片上传/批量请求；避免队列无限增长；结合AbortController取消任务；p-limit库已封装完善。
        前端如何做大整数精度处理？
        【核心定义】JS Number遵循IEEE 754，安全范围±2^53-1，超出丢失精度。
        【底层原理】BigInt原生支持(后缀n)但不可与Number混算/JSON序列化；字符串仅展示；第三方库(decimal.js)适合金融计算。
        【代码示例】
        const big = 9007199254740993n; // BigInt
        const id = "9007199254740993"; // 字符串传输
        import Decimal from 'decimal.js'; // 精确计算
        【注意事项】后端返回大整数务必用字符串；前端计算用BigInt或专用库；避免隐式类型转换导致精度丢失。
        如何优雅地取消异步请求？
        【核心定义】组件卸载/路由切换时中止未完成的请求。
        【底层原理】AbortController提供signal注入fetch/axios，调用abort()触发AbortError中断流程。
        【代码示例】
        const ctrl = new AbortController();
        fetch('/api', {signal: ctrl.signal}).catch(e=>{if(e.name==='AbortError') console.log('取消');});
        // 切换路由时
        ctrl.abort();
        【注意事项】避免内存泄漏与状态更新报错；简单场景可用isUnmounted标识位；axios旧版用CancelToken。
        call、apply、bind 的区别是什么？
        【核心定义】改变函数this指向与调用方式。
        【底层原理】call/apply立即执行，参数逐个vs数组；bind返回新函数延后执行，支持参数预置。
        【代码示例】
        fn.call(obj, 1, 2);
        fn.apply(obj, [1, 2]);
        const bound = fn.bind(obj, 1); bound(2);
        【注意事项】this为null/undefined时非严格模式指向window；bind可柯里化；箭头函数this不可改。
        new 操作符的执行过程是什么？
        【核心定义】创建构造函数实例。
        【底层原理】1.创建空对象 2.proto__连原型 3.bind this执行构造 4.返回对象(若构造返回对象则覆盖)。
        【代码示例】
        function myNew(Ctor, ...args) {
        const obj = Object.create(Ctor.prototype);
        const res = Ctor.apply(obj, args);
        return res instanceof Object ? res : obj;
        }
        【注意事项】构造函数不应返回非对象值；Object.create替代手动设__proto；ES6 class必须new调用，否则抛错。
        什么是作用域和作用域链？
        【核心定义】变量可访问范围与查找路径。
        【底层原理】全局/函数/块级作用域。查找从当前作用域向外层逐级搜索至全局，未找到报ReferenceError。闭包持有定义时作用域链。
        【代码示例】
        let a=1;
        function outer(){let b=2; function inner(){console.log(a,b);}}
        // inner通过作用域链访问a(全局)和b(outer)
        【注意事项】块级作用域(let/const)不提升；避免全局变量污染；闭包延长作用域链生命周期需注意内存。
        什么是变量提升和暂时性死区？
        【核心定义】声明提前至作用域顶部的行为。
        【底层原理】var/function声明提升(赋值不提升/整体提升)。let/const不提升，声明前访问触发TDZ报错。
        【代码示例】
        console.log(a); var a=1; // undefined
        console.log(b); let b=1; // ReferenceError (TDZ)
        【注意事项】优先let/const；变量先声明后使用；TDZ保障代码严谨性，避免var的隐式全局问题。
        如何判断一个值是数组？
        【核心定义】准确识别数组类型。
        【底层原理】Array.isArray基于内部[[Class]]检查最可靠；instanceof跨环境失效；toString通用但繁琐。
        【代码示例】
        Array.isArray([]); // ✅ 推荐
        Object.prototype.toString.call([]) === '[object Array]';
        【注意事项】跨iframe/窗口instanceof不可靠；避免用typeof(返回object)；类型检查需结合非空判断。
        如何实现数组去重？
        【核心定义】移除重复元素。
        【底层原理】Set基于唯一值特性最高效；filter+indexOf适合简单场景；对象数组转Map按唯一键提取。
        【代码示例】
        [...new Set(arr)];
        arr.filter((v,i)=>arr.indexOf(v)===i);
        // 对象按id去重
        Array.from(new Map(arr.map(o=>[o.id,o])).values());
        【注意事项】Set去重不改变原数组；对象去重需指定唯一标识；注意NaN/undefined的处理差异。
        数组的哪些方法会改变原数组？
        【核心定义】区分数组可变与不可变方法。
        【底层原理】增删改排序类(push/pop/shift/unshift/splice/sort/reverse/fill/copyWithin)修改原数组；映射过滤遍历类(map/filter/reduce/forEach/slice/concat)返回新数组。
        【代码示例】
        const a=[1,2]; a.push(3); // a变为[1,2,3]
        const b=[1,2]; const c=b.map(x=>x*2); // b不变, c为[2,4]
        【注意事项】函数式编程优先不可变方法；需修改时明确注释；避免在遍历中修改原数组导致索引错乱。
        map、forEach、filter、reduce 的区别是什么？
        【核心定义】遍历方法用途与返回值不同。
        【底层原理】map返回新数组(转换)；forEach无返回值(副作用)；filter返回符合条件新数组(筛选)；reduce返回累计值(聚合/扁平化)。均不可break中断。
        【代码示例】
        [1,2,3].map(x=>x*2); // [2,4,6]
        [1,2,3].filter(x=>x>1); // [2,3]
        [1,2,3].reduce((s,x)=>s+x,0); // 6
        【注意事项】forEach不可return中断；复杂逻辑用for/of或some/every可中断；reduce初始值注意类型匹配。
        什么是柯里化？如何实现？
        【核心定义】多参函数转单参函数链。
        【底层原理】闭包缓存已传参数，参数够了执行原函数，不够返回新函数。
        【代码示例】
        function curry(fn, ...args) {
        return args.length>=fn.length ? fn(...args) : (...more)=>curry(fn,...args,...more);
        }
        const add = curry((a,b,c)=>a+b+c);
        add(1)(2)(3); // 6
        【注意事项】需知道原函数参数长度；适用于参数复用/延迟执行/函数组合；性能略低于直接调用。
        什么是高阶函数？举例说明
        【核心定义】接收或返回函数的函数。
        【底层原理】函数是一等公民，可作为参数传递或返回值。实现逻辑抽象与复用。
        【代码示例】
        [1,2].map(x=>x2); // 接收函数
        function multiplier(f){return n=>nf;} // 返回函数
        const double = multiplier(2); double(5); // 10
        【注意事项】是函数组合/中间件/装饰器基础；注意闭包引用与内存管理；避免过度嵌套。
        什么是纯函数？有什么好处？
        【核心定义】相同输入必得相同输出，且无副作用。
        【底层原理】不依赖/修改外部状态，不执行I/O。保证确定性、可测试性、可缓存性、可并行性。
        【代码示例】
        const add = (a,b) => a+b; // 纯
        const inc = () => { count++; }; // 非纯(改外部)
        const log = msg => console.log(msg); // 非纯(副作用)
        【注意事项】核心逻辑尽量纯函数化；副作用隔离到边界；纯函数是函数式编程基石。
        什么是副作用？如何避免？
        【核心定义】函数对外部状态的可观察修改。
        【底层原理】修改全局变量、操作DOM、发请求、读写文件、随机数/时间等打破确定性。
        【代码示例】
        // 隔离副作用
        function pureCalc(a,b){return a+b;}
        function sideEffectUI(result){document.body.innerText=result;}
        【注意事项】无法完全消除，需控制边界；用返回值替代修改；依赖注入传递外部依赖；Redux中间件管理副作用。
        什么是记忆化（Memoization）？如何实现？
        【核心定义】缓存函数计算结果，相同输入直接返回。
        【底层原理】闭包维护Map缓存，键为参数序列化，值为结果。避免重复昂贵计算。
        【代码示例】
        function memoize(fn) {
        const cache = new Map();
        return (...args) => {
        const key = JSON.stringify(args);
        if(cache.has(key)) return cache.get(key);
        const res = fn.apply(this,args);
        cache.set(key,res); return res;
        };
        }
        【注意事项】适合纯函数；参数含对象/函数时序列化可能失效；注意缓存内存泄漏，可设LRU或TTL。
        如何实现一个发布订阅模式？
        【核心定义】事件处理机制，发布者触发，订阅者响应。
        【底层原理】维护事件名与回调数组映射。on注册，emit遍历执行，off移除。解耦组件通信。
        【代码示例】
        class EventEmitter {
        constructor(){this.events={};}
        on(ev,cb){(this.events[ev]||=[]).push(cb);return()=>this.off(ev,cb);}
        emit(ev,...args){(this.events[ev]||[]).forEach(cb=>cb(...args));}
        off(ev,cb){if(this.events[ev])this.events[ev]=this.events[ev].filter(c=>c!==cb);}
        }
        【注意事项】需处理内存泄漏(移除监听)；支持once单次监听；复杂系统用消息队列替代。
        什么是观察者模式？和发布订阅有什么区别？
        【核心定义】一对多依赖通知机制，实现方式不同。
        【底层原理】观察者：目标直接维护观察者列表，状态变遍历通知(耦合高)。发布订阅：通过事件中心中转，发布者/订阅者互不知晓(解耦)。
        【代码示例】
        // 观察者: Subject维护observers数组, notify遍历调用update
        // 发布订阅: EventEmitter中心, emit触发, on监听
        【注意事项】简单同步用观察者；复杂异步/跨模块用发布订阅；Vue响应式是观察者+依赖收集。
        什么是代理模式？如何实现？
        【核心定义】为对象提供代理控制访问。
        【底层原理】ES6 Proxy拦截属性读写/删除/调用等操作，可加入校验/日志/缓存/响应式逻辑。
        【代码示例】
        const proxy = new Proxy(target, {
        get(obj,prop){console.log('读',prop); return obj[prop]||'default';},
        set(obj,prop,val){console.log('写',prop,'=',val); obj[prop]=val; return true;}
        });
        【注意事项】Vue3响应式核心；拦截所有操作有性能开销；需处理this绑定；适合数据校验/日志/权限控制。
        什么是迭代器和生成器？
        【核心定义】迭代器提供遍历接口；生成器创建迭代器。
        【底层原理】实现[Symbol.iterator]返回next()对象{value,done}。function定义生成器，yield暂停/恢复。
        【代码示例】
        function gen(){yield 1; yield 2; yield 3;}
        const it = gen();
        it.next(); // {value:1, done:false}
        【注意事项】生成器适合异步流程控制/惰性计算；可配合for...of遍历；注意yield返回值传递。
        什么是 Promise A+ 规范？
        【核心定义】Promise标准化规范，确保实现一致。
        【底层原理】状态不可逆；then返回新Promise支持链式；回调必须函数否则忽略；回调异步执行(宏任务)；值穿透与错误冒泡。
        【代码示例】
        p.then(null, onRejected) 等价于 p.catch(onRejected)
        p.then().then(v=>v) 值穿透
        【注意事项】通过promise-aplus-tests验证；then回调必须异步；resolve/reject只能调用一次。
        如何实现一个 Promise？
        【核心定义】实现Promise核心状态机与链式调用。
        【底层原理】维护status/value/reason与回调队列。resolve/reject状态转移并执行队列。then返回新Promise处理值穿透与链式决议。
        【代码示例】
        class MyPromise {
        constructor(exec){this.status='pending';this.val=undefined;this.reason=undefined;this.onF=[];this.onR=[];
        const resolve=v=>{if(this.status==='pending'){this.status='fulfilled';this.val=v;this.onF.forEach(fn=>fn());}};
        const reject=r=>{if(this.status==='pending'){this.status='rejected';this.reason=r;this.onR.forEach(fn=>fn());}};
        try{exec(resolve,reject);}catch(e){reject(e);}
        }
        then(onF,onR){return new MyPromise((resolve,reject)=>{
        // 状态判断执行回调，处理链式与穿透，微任务队列执行
        });}
        }
        【注意事项】完整版需处理thenable对象递归解析；微任务队列执行回调；错误捕获与状态锁定；参考Promise/A+测试集。
        async/await 如何处理错误？
        【核心定义】异步错误捕获机制。
        【底层原理】await拒绝的Promise会抛出异常，需用try/catch捕获。未捕获导致unhandledrejection。
        【代码示例】
        async function safeFetch() {
        try { const res = await fetch('/api'); return await res.json(); }
        catch(e) { console.error('失败',e); return null; }
        }
        const results = await Promise.allSettled([p1, p2]); // 容错并行
        【注意事项】始终处理错误；区分业务错误与网络错误；避免空catch吞异常；allSettled适合多请求容错。
        什么是微任务和宏任务？执行顺序是怎样的？
        【核心定义】任务队列分类与执行顺序。
        【底层原理】微任务(Promise/MutationObserver/queueMicrotask)优先级高，当前宏任务结束后立即清空。宏任务(setTimeout/I/O/UI事件)每次循环执行一个。
        【代码示例】
        同步 → 微任务清空 → 渲染 → 1个宏任务 → 循环
        【注意事项】微任务过多阻塞渲染；宏任务间隔受最小延迟限制(通常4ms)；Node.js中process.nextTick优先级高于Promise。
        什么是事件委托？有什么优缺点？
        【核心定义】利用冒泡集中管理事件。
        【底层原理】父元素监听，e.target判断实际触发者。减少监听器数量，动态元素自动生效，内存友好。
        【代码示例】
        list.addEventListener('click', e => {
        const item = e.target.closest('.item');
        if(item) handle(item);
        });
        【注意事项】非冒泡事件(focus/blur)不适用；需精确判断target防误触；深层嵌套时closest性能略降。
        什么是防抖和节流？区别是什么？
        【核心定义】频率控制策略差异。
        【底层原理】防抖重“最后一次”，定时器重置；节流重“固定间隔”，时间戳/定时器锁定。
        【代码示例】
        防抖：搜索框输入停后再请求
        节流：滚动加载/按钮防重复点击
        【注意事项】防抖可能永远不触发(持续输入)；节流保证执行频率；根据业务场景选择。
        如何手写 call、apply、bind？
        【核心定义】模拟this绑定与调用。
        【底层原理】call/apply将函数挂载到context临时属性执行后删除；bind返回包装函数支持参数预设与延迟执行。
        【代码示例】
        Function.prototype.myCall = function(ctx, ...args) {
        ctx = ctx || window;
        const fn = Symbol('fn');
        ctx[fn] = this;
        const res = ctxfn;
        delete ctx[fn];
        return res;
        };
        Function.prototype.myBind = function(ctx, ...preArgs) {
        const fn = this;
        return function(...args) { return fn.apply(ctx, [...preArgs, ...args]); };
        };
        【注意事项】处理ctx为null/undefined情况；bind返回函数可new调用(需特殊处理)；箭头函数this不可改。
        什么是 this？this 的绑定规则有哪些？
        【核心定义】函数执行时this指向的确定机制。
        【底层原理】优先级：new绑定 > 显式(call/apply/bind) > 隐式(obj.method) > 默认(window/undefined) > 箭头函数(词法继承)。
        【代码示例】
        new Foo() // this指向新对象
        obj.fn() // this指向obj
        fn.call(ctx) // this指向ctx
        const arrow = () => this; // this继承外层定义时环境
        【注意事项】箭头函数this定义时确定不可改；严格模式默认this为undefined；DOM事件处理函数this指向触发元素。
        什么是原型链？如何实现继承？
        【核心定义】属性查找路径与代码复用机制。
        【底层原理】实例→构造函数.prototype→Object.prototype→null。继承从原型链/构造函数到寄生组合式(最优)，ES6 class语法糖。
        【代码示例】
        function Parent(name){this.name=name;}
        Parent.prototype.say=function(){console.log(this.name);}
        function Child(name,age){Parent.call(this,name);this.age=age;}
        Child.prototype=Object.create(Parent.prototype);
        Child.prototype.constructor=Child;
        【注意事项】避免直接赋值Child.prototype=new Parent()导致引用共享与多余构造调用；class继承必须super()；原型链查找有性能开销可缓存。

        四、TypeScript核心与进阶
        1. TypeScript 相比 JavaScript 有什么优势？
        【核心定义】JS的超集，添加静态类型系统，编译为纯JS。
        【底层原理】编译期类型检查拦截错误，IDE基于类型信息提供智能提示，类型定义即文档，支持渐进式迁移。
        【代码示例】
        function add(a: number, b: number): number { return a + b; }
        add(1, '2'); // 编译报错，阻止运行时异常
        【注意事项】开启strict模式提升安全性；.js与.ts可混用逐步迁移；类型系统不改变运行时行为。
        
        2. TypeScript 有哪些基本类型？
        【核心定义】基础数据类型与特殊类型集合。
        【底层原理】基本类型存栈内存按值访问；特殊类型控制类型检查严格度。
        【代码示例】
        string, number, boolean, null, undefined, symbol, bigint
        any(关闭检查), unknown(安全任意), never(永不返回), void(无返回)
        【注意事项】unknown比any安全，需类型收窄后才能操作；never用于抛出异常或死循环函数。
        
        3. interface 和 type 有什么区别？
        【核心定义】定义类型结构的两种方式。
        【底层原理】interface支持声明合并与extends继承，适合对象形状；type支持联合/交叉/映射/条件类型，适合复杂组合。编译器处理方式略有差异。
        【代码示例】
        interface User { id: number; name: string; }
        type Status = 'pending' | 'success' | 'error';
        type UserWithRole = User & { role: string };
        【注意事项】描述对象/类实现优先interface；联合/工具类型优先type；性能差异可忽略，按语义选择。
        
        4. 什么是泛型？如何使用？
        【核心定义】类型参数化，编写可复用的类型安全代码。
        【底层原理】编译时替换类型变量，保持类型关联。配合extends约束提升安全性。
        【代码示例】
        function identity<T>(arg: T): T { return arg; }
        interface ApiResponse<T> { data: T; status: number; }
        function getProperty<T, K extends keyof T>(obj: T, key: K) { return obj[key]; }
        【注意事项】泛型约束避免any滥用；默认类型参数提升API友好度；避免过度泛型导致推断困难。
        
        5. 什么是联合类型和交叉类型？
        【核心定义】类型集合运算方式。
        【底层原理】联合(|)表示多选一，取并集；交叉(&)表示同时满足，取交集。交叉类型属性冲突时解析为never。
        【代码示例】
        type ID = string | number; // 联合
        type AdminUser = User & { permissions: string[] }; // 交叉
        【注意事项】联合类型访问属性需类型守卫收窄；交叉类型常用于对象属性扩展。
        
        6. 什么是类型守卫？有哪些方式？
        【核心定义】运行时收窄类型范围，提升分支内类型精度。
        【底层原理】编译器分析控制流，根据条件表达式缩小联合类型。
        【代码示例】
        typeof id === 'string' // 类型守卫
        value instanceof Date // 实例守卫
        'fly' in pet // in守卫
        function isStr(v: unknown): v is string { return typeof v === 'string'; } // 谓词守卫
        【注意事项】谓词函数必须返回布尔值；利用相等性检查可自动收窄；避免在守卫中产生副作用。
        
        7. 什么是 keyof 和 typeof 操作符？
        【核心定义】类型查询与提取操作符。
        【底层原理】keyof提取对象所有键的联合类型；typeof获取变量或表达式的类型。常用于泛型约束与动态属性访问。
        【代码示例】
        type UserKeys = keyof User; // 'id' | 'name'
        const config = { port: 3000 };
        type ConfigType = typeof config; // { port: number }
        【注意事项】keyof常配合泛型约束保证属性访问安全；typeof在类型位置使用，非运行时。
        
        8. 什么是映射类型？
        【核心定义】基于旧类型遍历键名创建新类型。
        【底层原理】[P in keyof T]语法遍历，可修改修饰符(-readonly/-?)或值类型。内置工具类型基于此实现。
        【代码示例】
        type Readonly<T> = { readonly [P in keyof T]: T[P]; };
        type Partial<T> = { [P in keyof T]?: T[P]; };
        type Mutable<T> = { -readonly [P in keyof T]: T[P]; };
        【注意事项】映射类型编译时展开，不产生运行时开销；注意key顺序可能变化。
        
        9. 什么是条件类型？
        【核心定义】类型层面的三元运算，根据条件选择类型。
        【底层原理】T extends U ? X : Y。传入联合类型时默认分布式展开，可加方括号[T]关闭分布。
        【代码示例】
        type IsString<T> = T extends string ? true : false;
        type NonNullable<T> = T extends null | undefined ? never : T;
        【注意事项】分布式特性常用于工具类型；复杂条件类型可能降低编译速度，需权衡。
        
        10. 什么是 infer 关键字？
        【核心定义】在条件类型中自动推断子类型。
        【底层原理】类型模式匹配，捕获泛型参数位置的实际类型。常用于提取函数返回值、Promise值、数组元素。
        【代码示例】
        type ReturnType<T> = T extends (...args: any[]) => infer R ? R : any;
        type UnwrapPromise<T> = T extends Promise<infer V> ? V : T;
        【注意事项】infer只能在extends条件类型中使用；可声明多个infer捕获不同位置类型。
        
        11. 什么是装饰器？如何在 TypeScript 中使用？
        【核心定义】修改类、方法、属性、参数行为的元编程特性。
        【底层原理】基于Tapable思想，编译时注入元数据与描述符修改。TS5.0支持标准装饰器，旧版需experimentalDecorators。
        【代码示例】
        function log(target: any, key: string, descriptor: PropertyDescriptor) {
        const original = descriptor.value;
        descriptor.value = function(...args) { console.log('call', key); return original.apply(this, args); };
        }
        class Service { @log getData() {} }
        【注意事项】装饰器执行顺序：参数→方法→访问器→属性→类；注意this绑定；标准装饰器API已变更。
        
        12. 什么是模块解析策略？
        【核心定义】TS查找导入模块路径的规则。
        【底层原理】Node模拟Node.js解析；Classic为旧策略；NodeNext/Node16支持package.json exports字段；bundler适配Vite/Webpack。
        【代码示例】
        tsconfig.json: "moduleResolution": "bundler"
        【注意事项】现代项目推荐bundler或NodeNext；确保与打包器解析逻辑一致；别名需配置paths。
        
        13. 如何配置 tsconfig.json？
        【核心定义】TS编译器选项配置文件。
        【底层原理】控制目标语法、模块系统、严格检查、路径解析、输出目录等。影响编译行为与类型检查范围。
        【代码示例】
        {
        "compilerOptions": {
        "target": "ES2020", "module": "ESNext", "strict": true,
        "esModuleInterop": true, "skipLibCheck": true,
        "moduleResolution": "bundler", "outDir": "./dist"
        },
        "include": ["src/**/*"], "exclude": ["node_modules"]
        }
        【注意事项】开启strict提升质量；skipLibCheck加速编译；paths配置别名需配合打包器插件。
        
        14. 什么是声明文件（.d.ts）？
        【核心定义】描述JS库类型信息的契约文件。
        【底层原理】提供类型定义供TS检查，不生成JS代码。通过declare关键字声明全局变量、模块、函数。
        【代码示例】
        declare module 'my-lib' { export function init(): void; }
        declare const $: (selector: string) => any;
        【注意事项】优先安装@types/包名；缺失时手动编写或快速声明；注意模块作用域与全局作用域区别。
        
        15. 什么是命名空间和模块？
        【核心定义】代码组织与隔离方式。
        【底层原理】命名空间(namespace)编译为IIFE闭包，易造成全局污染；模块(import/export)基于ES6标准，天然作用域隔离。
        【代码示例】
        namespace Utils { export function format() {} } // 不推荐
        export function format() {} // 推荐模块
        【注意事项】现代TS项目全面使用ES模块；避免namespace与module混用；引用外部库用import。
        
        16. 什么是类型收窄？
        【核心定义】缩小联合类型范围，提升代码安全性。
        【底层原理】控制流分析结合类型守卫，在特定分支内确定精确类型。支持相等性、in、instanceof、真值检查。
        【代码示例】
        function process(val: string | number) {
        if (typeof val === 'string') { val.toUpperCase(); } // 分支内val为string
        else { val.toFixed(2); } // 分支内val为number
        }
        【注意事项】利用TS自动收窄减少断言；注意可空类型(null/undefined)需显式检查；避免逻辑漏洞导致收窄失效。
        
        17. 什么是枚举？有哪些类型？
        【核心定义】命名常量集合。
        【底层原理】数字枚举自增编译为查找表；字符串枚举显式赋值编译为字符串映射；常量枚举(const enum)编译时内联，无运行时对象。
        【代码示例】
        enum Status { Pending='PENDING', Success='SUCCESS' }
        const enum Color { Red, Blue } // 内联
        【注意事项】推荐联合类型替代枚举以获得更好类型推断；const enum需isolatedModules配置；避免反向映射混淆。
        
        18. 什么是类型断言？如何使用？
        【核心定义】手动告诉编译器已知确切类型。
        【底层原理】编译期提示，不改变运行时行为。as语法或尖括号语法（JSX中禁用尖括号）。
        【代码示例】
        const input = document.getElementById('name') as HTMLInputElement;
        const val = unknownVal as string; // 强制断言
        【注意事项】滥用会失去类型安全；优先用类型守卫或satisfies；非空断言(!)需确保值确实存在。
        
        19. 什么是 satisfies 操作符？
        【核心定义】验证表达式类型，但不改变表达式推断类型。
        【底层原理】TS4.9引入，保持字面量精度同时满足接口约束。替代部分as断言场景。
        【代码示例】
        type Colors = 'red' | 'green';
        const palette = { red: [255,0,0], green: [0,255,0] } satisfies Record<Colors, number[]>;
        // palette.red 仍推断为 [255,0,0] 而非 number[]
        【注意事项】适合配置对象/常量映射验证；不改变后续使用时的类型精度。
        
        20. 什么是 const 断言？
        【核心定义】让字面量类型尽可能窄且只读。
        【底层原理】as const阻止类型拓宽，数组变为readonly元组，对象属性变为readonly。
        【代码示例】
        const arr = [1, 2] as const; // readonly [1, 2]
        const config = { port: 3000 } as const; // { readonly port: 3000 }
        【注意事项】用于配置常量/路由表/状态码；修改会报错；配合映射类型生成精确键值对。
        
        21. 如何处理第三方库的类型问题？
        【核心定义】补充缺失类型声明的方案。
        【底层原理】社区类型包(@types)、手动declare module、临时any绕过、模块增强扩展类型。
        【代码示例】
        npm i -D @types/lodash
        declare module 'untyped-lib' { export function run(): void; }
        declare module 'express' { interface Request { user?: { id: string } } }
        【注意事项】优先社区包；自定义声明放typings目录；模块增强需注意作用域；避免全局any污染。
        
        22. TypeScript 性能优化有哪些技巧？
        【核心定义】提升编译与类型检查速度。
        【底层原理】减少扫描范围、跳过依赖检查、避免复杂递归类型、拆分项目引用。
        【代码示例】
        "skipLibCheck": true,
        "include": ["src/**/*"],
        "references": [{ "path": "./packages/core" }]
        【注意事项】大项目用Project References增量编译；避免深层条件类型嵌套；升级TS版本获性能提升。
        
        五、React核心与进阶
        1. React 和 Vue 的核心区别是什么？
        【核心定义】设计哲学与实现机制差异。
        【底层原理】React函数式+不可变数据+JSX+单向流；Vue响应式+可变数据+模板+双向绑定。React Fiber可中断，Vue编译静态提升。
        【代码示例】
        React: const [count, setCount] = useState(0);
        Vue: const count = ref(0);
        【注意事项】选型看团队技术栈与项目规模；React生态灵活，Vue开箱即用；两者现代版本性能差距极小。
        
        2. 什么是虚拟 DOM？为什么需要它？
        【核心定义】JS对象模拟DOM结构。
        【底层原理】内存中Diff计算差异后批量更新真实DOM，减少直接操作开销。跨平台基础，声明式UI提升开发体验。
        【代码示例】
        { type: 'div', props: { className: 'box' }, children: [...] }
        【注意事项】非银弹，简单页面直接操作更快；Diff算法同层比较；key优化列表复用。
        
        3. React Hooks 解决了什么问题？
        【核心定义】函数组件状态与副作用管理机制。
        【底层原理】解决类组件逻辑复用难(HOC嵌套)、生命周期分散、this绑定复杂、相关逻辑割裂。基于调用顺序的状态链表。
        【代码示例】
        useState, useEffect, useContext, useReducer, useMemo, useCallback, useRef
        【注意事项】遵守Rules of Hooks，不可条件/循环调用；自定义Hook提取复用逻辑。
        
        4. useState 的工作原理是什么？
        【核心定义】函数组件状态管理Hook。
        【底层原理】React内部维护状态链表，每次渲染按顺序读取。更新异步批处理，依赖前值需用函数形式。
        【代码示例】
        const [count, setCount] = useState(0);
        setCount(prev => prev + 1); // 安全更新
        【注意事项】禁止条件调用；对象状态更新需展开合并；大批量更新React18自动批处理。
        
        5. useEffect 和 useLayoutEffect 有什么区别？
        【核心定义】副作用执行时机差异。
        【底层原理】useEffect渲染后异步执行不阻塞；useLayoutEffect渲染后同步执行阻塞DOM更新。调度队列不同。
        【代码示例】
        useEffect(() => { fetchData(); }, []); // 数据请求
        useLayoutEffect(() => { measureDOM(); }, []); // DOM测量
        【注意事项】优先useEffect；需读取布局/同步重排用useLayoutEffect；避免同步副作用阻塞渲染。
        
        6. useContext 适合什么场景？有什么缺点？
        【核心定义】跨组件传递数据。
        【底层原理】提供/消费模式。值变化触发所有消费者重渲染。调试困难，易隐式依赖。
        【代码示例】
        const ThemeContext = createContext('light');
        <ThemeContext.Provider value="dark"><App/></ThemeContext.Provider>
        const theme = useContext(ThemeContext);
        【注意事项】拆分Context减少不必要渲染；结合useMemo稳定value；复杂状态用Redux/Pinia。
        
        7. useMemo 和 useCallback 有什么区别？
        【核心定义】缓存优化Hook。
        【底层原理】useMemo缓存计算结果(返回值)；useCallback缓存函数引用(返回函数)。依赖数组不变时复用，避免子组件重渲染。
        【代码示例】
        const total = useMemo(() => items.reduce((s,i)=>s+i.price,0), [items]);
        const handleClick = useCallback(() => doSomething(id), [id]);
        【注意事项】先测量后优化；依赖缺失导致闭包陷阱；过度使用增加内存与比较开销。
        
        8. useRef 有哪些用途？
        【核心定义】持久化可变引用。
        【底层原理】返回{current}对象，生命周期内保持不变。修改current不触发重渲染。
        【代码示例】
        const inputRef = useRef<HTMLInputElement>(null); // DOM访问
        const timerRef = useRef<NodeJS.Timeout>(); // 存定时器
        const prevVal = useRef(val); // 记录上一状态
        【注意事项】仅用于不引起UI更新的值；DOM操作优先ref；避免用ref替代state。
        
        9. React 中 key 的作用是什么？
        【核心定义】列表元素身份标识。
        【底层原理】Diff算法对比依据。key不变复用实例，保持内部状态。无key或重复触发警告与性能下降。
        【代码示例】
        {users.map(u => <UserItem key={u.id} user={u} />)}
        【注意事项】禁用index(顺序变状态乱)与随机数(每次重建)；必须稳定唯一；静态列表可省略。
        
        10. 什么是受控组件和非受控组件？
        【核心定义】表单值管理方式。
        【底层原理】受控由state驱动值与更新，数据流清晰；非受控由DOM自身维护，通过ref读取。
        【代码示例】
        受控: <input value={val} onChange={e=>setVal(e.target.value)} />
        非受控: <input ref={inputRef} defaultValue="init" />
        【注意事项】复杂表单/实时验证用受控；文件上传/简单输入用非受控；避免混用导致警告。
        
        11. 什么是高阶组件（HOC）？有什么优缺点？
        【核心定义】接收组件返回增强组件的函数。
        【底层原理】函数包装模式。优点逻辑复用/解耦；缺点嵌套深/静态方法丢失/props冲突/类型推导复杂。
        【代码示例】
        const withAuth = (Wrapped) => (props) => { return isAuth ? <Wrapped {...props}/> : <Login/>; };
        【注意事项】现多被Custom Hooks替代；需转发ref与displayName；避免在render内定义HOC。
        
        12. 什么是 Render Props？和 HOC 有什么区别？
        【核心定义】通过函数prop传递渲染逻辑。
        【底层原理】组件组合模式。灵活性高避免包装地狱，但易回调嵌套。HOC隐式注入props易冲突。
        【代码示例】
        <MouseTracker render={({x,y}) => <p>{x},{y}</p>} />
        【注意事项】优先Hooks；Render Props适合复杂UI逻辑共享；注意命名规范(children as function)。
        
        13. 什么是自定义 Hook？如何编写？
        【核心定义】提取组件逻辑为可复用函数。
        【底层原理】use前缀命名，内部调用其他Hook，返回数据/函数。遵守调用规则，闭包保存状态。
        【代码示例】
        function useFetch(url) {
        const [data, setData] = useState(null);
        useEffect(() => { fetch(url).then(r=>r.json()).then(setData); }, [url]);
        return data;
        }
        【注意事项】处理清理函数防内存泄漏；依赖数组完整；避免返回不稳定引用。
        
        14. React 性能优化有哪些方案？
        【核心定义】减少不必要渲染与包体积。
        【底层原理】React.memo/useMemo/useCallback防重渲染；lazy+Suspense代码分割；虚拟列表；状态局部化；Profiler定位瓶颈。
        【代码示例】
        const MemoComp = React.memo(Comp, (prev, next) => prev.id === next.id);
        const Page = lazy(() => import('./Page'));
        【注意事项】先测量后优化；避免过度记忆化；列表用虚拟滚动；拆分大组件。
        
        15. 什么是 Fiber 架构？
        【核心定义】React16+可中断渲染引擎。
        【底层原理】时间分片拆任务、优先级调度、错误边界。链表结构替代递归栈，支持暂停/恢复/重用。
        【代码示例】
        // 底层调度，开发者无感知
        startTransition(() => { setFilter('all'); });
        【注意事项】提升复杂应用响应性；避免长任务阻塞；useTransition标记低优先级更新。
        
        16. 什么是错误边界（Error Boundary）？
        【核心定义】捕获子组件树JS错误并显示降级UI。
        【底层原理】类组件特有生命周期getDerivedStateFromError/componentDidCatch。不捕获事件/异步/SSR错误。
        【代码示例】
        class ErrorBoundary extends Component {
        state = { hasError: false };
        static getDerivedStateFromError() { return { hasError: true }; }
        render() { return this.state.hasError ? <Fallback/> : this.props.children; }
        }
        【注意事项】包裹易错组件；记录错误日志；函数组件无原生替代，需第三方库或Suspense边界。
        
        17. React 18 有哪些新特性？
        【核心定义】并发渲染与API升级。
        【底层原理】并发模式底层重构。自动批处理、useTransition/useDeferredValue、Suspense SSR流式渲染、新Hook、createRoot替代render。
        【代码示例】
        const root = createRoot(document.getElementById('root'));
        root.render(<App/>);
        【注意事项】升级需改根API；兼容旧版需适配批处理变化；流式SSR提升TTFB。
        
        18. 什么是 Server Components？
        【核心定义】服务端渲染组件不下发客户端。
        【底层原理】减少包体积、直连后端、自动代码分割。无交互/无Hook/无浏览器API。Client/Server组件可嵌套。
        【代码示例】
        // Server Component
        async function BlogPost({id}) { const post = await db.post.find(id); return <article>{post.title}</article>; }
        【注意事项】适合数据获取与静态展示；交互组件标记'use client'；注意序列化边界。
        
        19. Redux 的核心概念有哪些？
        【核心定义】可预测状态容器。
        【底层原理】单一Store、Action描述变更、Reducer纯函数计算新状态、Dispatch唯一触发。单向数据流。
        【代码示例】
        const store = configureStore({ reducer: { counter } });
        store.dispatch({ type: 'increment' });
        【注意事项】用Redux Toolkit简化；简单状态用Context/useState；避免全局状态滥用。
        
        20. 什么是 React Router？如何使用？
        【核心定义】声明式路由库。
        【底层原理】History API同步URL与UI。BrowserRouter/Routes/Route/Link声明配置，useNavigate编程跳转，Outlet渲染嵌套。
        【代码示例】
        <Routes><Route path="/user/:id" element={<User/>}/></Routes>
        navigate('/about');
        【注意事项】v6废弃Switch用Routes；动态路由useParams；导航守卫用loader/action或包装组件。
        
        21. 如何做 React 单元测试？
        【核心定义】验证组件行为。
        【底层原理】React Testing Library + Jest。测试用户行为而非实现细节。关注可访问性查询。
        【代码示例】
        render(<Button>Click</Button>);
        fireEvent.click(screen.getByRole('button'));
        expect(onClick).toHaveBeenCalled();
        【注意事项】避免测试内部state；用getByRole/queryByText；异步操作用waitFor；Mock网络请求。
        
        22. React 最佳实践有哪些？
        【核心定义】可维护高性能开发规范。
        【底层原理】职责单一、函数组件+Hooks优先、Custom Hooks复用、按需优化、TS类型安全、代码分割、错误边界。
        【代码示例】
        // 结构清晰
        function UserCard({user}) { return <div>{user.name}</div>; }
        export default React.memo(UserCard);
        【注意事项】避免过度抽象；保持组件小而专注；复杂表单受控；定期Profiler分析。

        六、Vue核心与进阶
        1. Vue2 和 Vue3 的核心区别是什么？
        【核心定义】底层重构与开发体验升级。
        【底层原理】Vue3性能提升(编译优化/Proxy响应式/Tree-shaking)、Composition API逻辑聚合、TS原生支持、新特性(Fragment/Teleport/Suspense)。
        【代码示例】
        Vue2: export default { data(){return{count:0}} }
        Vue3: <script setup> const count = ref(0) </script>
        【注意事项】Vue3推荐setup语法糖；Options API仍支持；迁移用@vue/compat渐进。
        
        2. 什么是 Composition API？为什么需要它？
        【核心定义】基于函数的逻辑组织方式。
        【底层原理】解决mixins命名冲突/来源不清、大组件data/methods分散、TS推导弱(this复杂)。按功能聚合代码。
        【代码示例】
        function useMouse() { const x=ref(0); onMounted(()=>...); return {x}; }
        const {x} = useMouse();
        【注意事项】逻辑清晰易测试；适合复杂组件；简单组件仍可用Options。
        
        3. setup 语法糖是什么？如何使用？
        【核心定义】简化Composition API书写。
        【底层原理】编译时自动处理导出，无需return。类型推导更优，支持顶层await。
        【代码示例】
        <script setup lang="ts">
        import { ref } from 'vue';
        const count = ref(0);
        defineProps<{ title: string }>();
        </script>
        【注意事项】顶层自动暴露；props/emits用define宏；this不可用。
        
        4. ref 和 reactive 有什么区别？
        【核心定义】响应式数据创建方式。
        【底层原理】ref适用任意类型需.value访问，可替换整体；reactive仅对象直接访问，替换丢失响应式。ref底层对对象用Proxy包装。
        【代码示例】
        const count = ref(0); count.value++;
        const state = reactive({ count: 0 }); state.count++;
        【注意事项】优先统一用ref减少心智负担；reactive解构需用toRefs；避免直接替换reactive对象。
        
        5. computed 和 watch 有什么区别？
        【核心定义】响应式派生与副作用监听。
        【底层原理】computed派生状态带缓存(依赖不变复用)；watch监听变化执行副作用(支持异步/深度监听)。
        【代码示例】
        const double = computed(() => count.value * 2);
        watch(count, (newVal) => saveToDB(newVal));
        【注意事项】计算值用computed；异步/复杂副作用用watch；watch默认浅监听，深度需{deep:true}。
        
        6. Vue 中的生命周期有哪些？
        【核心定义】组件实例创建到销毁的过程钩子。
        【底层原理】setup(替代beforeCreate/created)→onMounted→onUpdated→onUnmounted。组合式API函数形式。
        【代码示例】
        onMounted(() => console.log('挂载完成'));
        onUnmounted(() => clearInterval(timer));
        【注意事项】setup中同步代码相当于beforeCreate/created；卸载时清理定时器/监听器；SSR仅触发beforeCreate/created/mounted前。
        
        7. v-if 和 v-show 的区别是什么？
        【核心定义】条件渲染与条件显示。
        【底层原理】v-if true创建/挂载false销毁(开销大，初始false不渲染)；v-show CSS display控制(开销小，始终渲染)。
        【代码示例】
        <div v-if="isVisible">内容</div>
        <div v-show="isVisible">内容</div>
        【注意事项】频繁切换用v-show；条件少/初始隐藏用v-if；v-if有完整生命周期。

        8.v-for 中 key 的作用是什么？
        【核心定义】节点身份标识优化Diff。
        【底层原理】高效复用与状态保持。必须唯一稳定。禁用索引(顺序变状态乱)。禁止v-for与v-if同元素。
        【代码示例】
        <li v-for="item in list" :key="item.id">{{ item.name }}</li>
        【注意事项】key变化触发重新渲染；静态列表可省略；对象数组用唯一ID。

        9. 什么是 Vue 的响应式原理？
        【核心定义】数据变更自动更新视图。
        【底层原理】Vue2 Object.defineProperty拦截(无法检测新增/索引变化)；Vue3 Proxy拦截所有操作。getter收集依赖，setter触发更新，异步队列批量更新。
        【代码示例】
        // Vue3 Proxy核心
        new Proxy(target, {
        get(target, key) { track(target, key); return target[key]; },
        set(target, key, val) { target[key]=val; trigger(target, key); return true; }
        });
        【注意事项】Vue3响应式更彻底；避免直接替换reactive对象；shallowRef/shallowReactive优化大对象。
        
        10. Vue 组件通信有哪些方式？
        【核心定义】数据流与事件机制。
        【底层原理】父子(props/$emit)、兄弟(事件总线/状态库)、跨级(provide/inject)、全局(Pinia)、ref访问实例。
        【代码示例】
        父传子: <Child :msg="text" @update="handle"/>
        跨级: provide('theme', 'dark'); const theme = inject('theme');
        【注意事项】优先props/$emit；复杂状态用Pinia；避免过度provide破坏封装；ref慎用。
        
        11. 什么是 provide 和 inject？
        【核心定义】依赖注入跨级传值。
        【底层原理】祖先provide提供数据，后代inject读取。避免逐层透传props。
        【代码示例】
        // 祖先
        provide('user', { name: 'Alice' });
        // 后代
        const user = inject('user', { name: 'Guest' }); // 带默认值
        【注意事项】谨慎使用，优先props；inject可设默认值；响应式provide需用ref/reactive包装。
        
        12. 什么是 Vuex？核心概念有哪些？
        【核心定义】集中式状态管理。
        【底层原理】state(全局状态)、getters(派生)、mutations(同步修改)、actions(异步)、modules(模块)。单向数据流。
        【代码示例】
        mutations: { increment(state) { state.count++ } }
        actions: { asyncIncrement({commit}) { setTimeout(()=>commit('increment'),1000) } }
        【注意事项】Vue3推荐Pinia替代；mutation必须同步；严格模式防直接修改state。
        
        13. 什么是 Pinia？相比 Vuex 有什么优势？
        【核心定义】Vue3官方推荐状态库。
        【底层原理】无mutations直接state/action、TS支持更好、模块化独立、体积更小。基于组合式API设计。
        【代码示例】
        export const useCounter = defineStore('counter', {
        state: () => ({ count: 0 }),
        getters: { double: s => s.count*2 },
        actions: { inc() { this.count++ } }
        });
        【注意事项】直接修改state支持时间旅行调试；支持SSR；迁移成本低。
        
        14. Vue Router 如何使用？
        【核心定义】官方路由管理。
        【底层原理】History/Hash模式同步URL与UI。createRouter配置routes，useRouter编程导航，useRoute获取参数。
        【代码示例】
        const router = createRouter({ history: createWebHistory(), routes: [{path:'/',component:Home}] });
        router.push('/about');
        【注意事项】动态路由addRoute；导航守卫beforeEach鉴权；路由懒加载()=>import()。
        
        15. 什么是动态组件？
        【核心定义】根据变量切换组件渲染。
        【底层原理】<component :is="currentComponent">。配合<keep-alive>缓存实例状态。
        【代码示例】
        <component :is="activeTab === 'A' ? CompA : CompB" />
        <keep-alive><component :is="view"/></keep-alive>
        【注意事项】适合Tab切换；keep-alive缓存onActivated/onUnmounted生命周期；注意内存管理。

        16. 什么是 Teleport？
        【核心定义】将内容渲染至指定DOM位置。
        【底层原理】脱离当前组件DOM树挂载到目标节点。解决遮罩层z-index/overflow问题。
        【代码示例】
        <Teleport to="body"><Modal v-if="show"/></Teleport>
        【注意事项】to支持CSS选择器；多个Teleport可挂载同目标；注意样式作用域。
        
        17. 什么是 Suspense？
        【核心定义】处理异步组件加载态。
        【底层原理】提供default与fallback模板，等待异步依赖解析。实验性API。
        【代码示例】
        <Suspense>
        <template #default><AsyncComp/></template>
        <template #fallback><div>加载中...</div></template>
        </Suspense>
        【注意事项】适合路由懒加载；嵌套Suspense协调加载；生产环境注意稳定性。

        18. Vue 性能优化有哪些方案？
        【核心定义】减少渲染与包体积。
        【底层原理】v-show替v-if、v-for加key避v-if、虚拟滚动、图片懒加载、路由懒加载、插件按需引入、shallowRef大对象。
        【代码示例】
        const largeList = shallowRef([]); // 避免深层响应式开销
        const Comp = defineAsyncComponent(() => import('./Heavy.vue'));
        【注意事项】避免滥用响应式；长列表虚拟滚动；按需引入UI库；Profiler定位瓶颈。
        
        19. 什么是自定义指令？
        【核心定义】DOM底层操作钩子。
        【底层原理】mounted/updated/unmounted生命周期。用于聚焦、权限、懒加载等。
        【代码示例】
        const vFocus = { mounted: el => el.focus() };
        <input v-focus />
        【注意事项】优先组件/属性绑定；指令用于底层DOM操作；注意卸载清理。

        20. 什么是插槽（Slot）？
        【核心定义】内容分发机制。
        【底层原理】默认/具名/作用域插槽。父组件向子组件传递模板内容，作用域插槽实现反向数据流。
        【代码示例】
        子: <slot name="header" :title="pageTitle"/>
        父: <template #header="{title}"><h1>{{title}}</h1></template>
        【注意事项】作用域插槽解耦UI与数据；默认插槽fallback内容；注意编译作用域。
        
        21. Vue 3.3+ 有哪些新特性？
        【核心定义】编译器与类型系统增强。
        【底层原理】defineModel宏简化v-model、defineOptions配置、defineSlots类型支持、v-for中v-if警告、泛型组件。
        【代码示例】
        const model = defineModel(); // 自动处理props/emits
        <script setup lang="ts" generic="T extends string">
        【注意事项】defineModel提升开发效率；泛型组件强类型约束；及时升级获性能优化。

        22. Vue 最佳实践有哪些？
        【核心定义】可维护高性能开发规范。
        【底层原理】组件职责单一、Composition API+setup优先、Pinia管状态、路由懒加载、TS类型检查、ESLint规范、Vitest单元测试。
        【代码示例】
        // 结构清晰
        <script setup>
        const { data } = useFetch('/api');
        </script>
        <template><div>{{ data }}</div></template>
        【注意事项】保持响应式数据精简；避免深层嵌套；复杂逻辑抽离composables；定期审计性能。

        七、Webpack核心与进阶
        1. Webpack 的核心概念是什么？
        【核心定义】模块打包工具，将各类资源转换为浏览器可用的静态文件。
        【底层原理】五大核心：Entry（入口构建依赖图）、Output（输出路径与命名）、Loader（文件转换器）、Plugin（生命周期扩展器）、Mode（开发/生产模式优化）。
        【代码示例】
        entry: './src/index.js'
        output: { filename: '[name].[contenthash].js', path: path.resolve(__dirname, 'dist') }
        module: { rules: [{ test: /.css$/, use: ['style-loader', 'css-loader'] }] }
        【注意事项】Loader处理单个文件类型，Plugin执行复杂任务；生产模式自动开启压缩与优化。
        
        2. Loader 和 Plugin 的区别是什么？
        【核心定义】职责与运行时机不同。
        【底层原理】Loader是转换器，在模块加载时逐个处理文件源码；Plugin是扩展器，基于Tapable事件流在构建全生命周期监听钩子执行任务。
        【代码示例】
        // Loader导出函数
        module.exports = function(source) { return source.replace(/foo/g, 'bar'); };
        // Plugin导出类
        class MyPlugin { apply(compiler) { compiler.hooks.emit.tap('MyPlugin', compilation => { ... }); } }
        【注意事项】Loader侧重内容转换；Plugin侧重构建流程控制与资源优化；两者常配合使用。
        
        3. 如何优化 Webpack 构建速度？
        【核心定义】减少编译时间与依赖解析开销。
        【底层原理】开发环境利用缓存、缩小Loader范围、多线程编译；生产环境升级核心依赖、优化SourceMap策略。
        【代码示例】
        cache: { type: 'filesystem' }
        module: { rules: [{ test: /.js$/, loader: 'babel-loader', include: path.resolve('src') }] }
        optimization: { splitChunks: { chunks: 'all' } }
        【注意事项】exclude /node_modules/ 必加；生产关闭cheap-module-source-map；合理使用alias减少解析路径。
        
        4. 如何实现代码分割（Code Splitting）？
        【核心定义】将代码拆分为多个Chunk按需加载。
        【底层原理】多入口拆分、SplitChunksPlugin自动提取公共依赖、动态import按需加载，减少首屏体积。
        【代码示例】
        import('./module').then(mod => mod.init());
        optimization: { splitChunks: { cacheGroups: { vendors: { test: /[\/]node_modules[\/], name: 'vendors' } } } }
        【注意事项】避免过度分割增加HTTP请求；公共库提取单独Chunk；路由级分割最常用。
        
        5. Tree Shaking 的原理是什么？如何生效？
        【核心定义】基于静态分析移除未引用代码。
        【底层原理】依赖ES Module静态结构，打包时标记未使用导出，生产压缩阶段删除死代码。
        【代码示例】
        package.json: { "sideEffects": false }
        import { specificFunc } from 'lib'; // 仅引入需要的
        【注意事项】必须使用ESM语法；CommonJS无法静态分析；需配合TerserPlugin实际删除；动态导入会破坏摇树。
        
        6. Webpack 的热更新（HMR）原理是什么？
        【核心定义】不刷新页面局部替换模块。
        【底层原理】文件变更触发重新编译生成manifest.json，WebSocket通知浏览器，运行时通过module.hot.accept替换模块，失败则回退刷新。
        【代码示例】
        if (module.hot) { module.hot.accept('./comp.js', () => { /* 更新逻辑 */ }); }
        【注意事项】需配置HotModuleReplacementPlugin或devServer.hot: true；状态保留依赖正确实现accept回调。
        
        7. Webpack5 相比 Webpack4 有哪些重大更新？
        【核心定义】底层架构与功能全面升级。
        【底层原理】持久化缓存提升二次构建；Module Federation原生支持微前端；Asset Modules替代file/url-loader；Tree Shaking增强；移除Node Polyfill；算法优化减体积。
        【代码示例】
        module: { rules: [{ test: /.(png|jpg)$/, type: 'asset/resource' }] }
        cache: { type: 'filesystem' }
        【注意事项】迁移需手动安装process/browser等Polyfill；注意sideEffects配置影响摇树。
        
        8. 什么是 Module Federation（模块联邦）？
        【核心定义】Webpack5原生微前端方案，运行时共享依赖与组件。
        【底层原理】独立构建的应用通过remoteEntry.js暴露模块，宿主应用动态加载，共享依赖避免重复打包。
        【代码示例】
        new ModuleFederationPlugin({
        name: 'app1', filename: 'remoteEntry.js',
        exposes: { './Button': './src/Button' },
        shared: { react: { singleton: true, eager: true } }
        })
        【注意事项】适合大型团队独立部署；需注意版本冲突；共享依赖配置singleton防多实例。
        
        9. Webpack 的构建流程是怎样的？
        【核心定义】从初始化到输出文件的完整生命周期。
        【底层原理】1.初始化配置合并 2.从Entry递归解析依赖调用Loader转换 3.组合优化生成Chunk 4.写入磁盘触发Plugin钩子输出文件。
        【代码示例】
        初始化 -> 编译模块 -> 生成Chunk -> 输出文件
        钩子: compile -> make -> seal -> emit -> done
        【注意事项】理解生命周期便于编写Plugin；seal阶段进行优化与压缩；emit阶段可修改输出资源。
        
        10. 如何配置 Source Map？
        【核心定义】映射压缩后代码到源码，便于调试。
        【底层原理】开发环境用快速定位策略，生产环境用隐藏或关闭策略。不同选项影响构建速度与映射精度。
        【代码示例】
        devtool: 'eval-cheap-module-source-map' // 开发推荐
        devtool: 'hidden-source-map' // 生产上传监控平台
        devtool: false // 生产关闭
        【注意事项】eval最快但体积大；cheap仅行级映射；module包含loader转换前源码；生产勿用内联source-map防泄露。
        
        11. 什么是 Scope Hoisting（作用域提升）？
        【核心定义】合并模块至同一函数作用域。
        【底层原理】减少闭包与模块包装函数数量，降低文件体积，提升执行性能。生产环境默认开启。
        【代码示例】
        optimization: { concatenateModules: true }
        // 开发环境手动开启
        new webpack.optimize.ModuleConcatenationPlugin()
        【注意事项】仅对ESM模块有效；CommonJS模块会降级处理；与Tree Shaking配合效果最佳。
        
        12. 如何处理多环境配置？
        【核心定义】合并公共配置与环境差异化配置。
        【底层原理】使用webpack-merge合并基础配置与dev/prod配置，通过DefinePlugin注入环境变量控制运行时行为。
        【代码示例】
        const { merge } = require('webpack-merge');
        module.exports = merge(common, isProd ? prodConfig : devConfig);
        new webpack.DefinePlugin({ 'process.env.NODE_ENV': JSON.stringify(env) })
        【注意事项】环境变量需JSON.stringify包裹；配置拆分按职责：基础、开发、生产、公共优化。
        
        13. Webpack 的 Tapable 是什么？
        【核心定义】Webpack核心事件流库，实现发布订阅模式。
        【底层原理】Compiler与Compilation暴露大量钩子（SyncHook/AsyncSeriesHook等），Plugin通过tap注册回调介入构建各阶段。
        【代码示例】
        compiler.hooks.emit.tapAsync('MyPlugin', (compilation, callback) => { ... callback(); });
        【注意事项】钩子分同步/异步/并行/ waterfall；异步钩子必须调用callback；理解钩子触发时机是写Plugin关键。
        
        八、Vite核心与进阶
        1. Vite 为什么比 Webpack 快？
        【核心定义】开发环境无打包按需编译，生产环境优化构建。
        【底层原理】开发基于Native ES Modules，浏览器直接请求模块，Vite仅按需编译当前文件；预构建用esbuild（Go编写）速度极快；生产用Rollup优化。
        【代码示例】
        浏览器直接请求 /src/main.js -> Vite拦截 -> 编译TSX -> 返回ESM
        【注意事项】大项目首屏请求数多但不影响开发体验；依赖预构建缓存机制保障后续启动速度。
        
        2. Vite 的开发服务器原理是什么？
        【核心定义】拦截请求动态编译返回ES模块。
        【底层原理】拦截node_modules与源码请求，动态编译TS/JSX/Vue，重写裸模块路径为/@modules/，利用浏览器原生ESM实现秒启。
        【代码示例】
        import vue from 'vue'; // 浏览器请求 /@modules/vue -> Vite返回ESM格式
        【注意事项】不支持IE11；需确保浏览器支持ES Modules；代理与别名配置在vite.config.js中。
        
        3. Vite 如何处理 CommonJS 依赖？
        【核心定义】依赖预构建转换CJS为ESM。
        【底层原理】启动时用esbuild扫描依赖，将CJS转为ESM，合并多入口为单文件，缓存至node_modules/.vite，解决浏览器兼容并减少请求。
        【代码示例】
        optimizeDeps: { include: ['lodash-es'], exclude: ['local-pkg'] }
        【注意事项】频繁变更的本地包加入exclude防重复构建；预构建缓存失效条件：package.json变更或手动删除.vite。
        
        4. Vite 的热更新（HMR）原理是什么？
        【核心定义】精准模块替换不刷新页面。
        【底层原理】WebSocket监听文件变更，重新编译变更模块，发送update消息，浏览器直接替换对应ESM模块并执行accept回调，保持状态。
        【代码示例】
        if (import.meta.hot) { import.meta.hot.accept(mod => { /* 更新UI */ }); }
        【注意事项】精确依赖追踪减少无效更新；HMR边界需手动处理状态恢复；生产环境自动剥离HMR代码。
        
        5. Vite 和 Webpack 的核心区别是什么？
        【核心定义】构建理念与适用场景差异。
        【底层原理】Vite Bundleless按需编译开发极快，生产Rollup打包；Webpack Bundled全量打包生态成熟。Vite适合现代项目追求体验，Webpack适合复杂遗留项目。
        【代码示例】
        Vite: 开发毫秒级启动，HMR不随项目增大变慢
        Webpack: 开发需全量打包，大项目HMR变慢
        【注意事项】老项目迁移需处理别名/插件兼容；Vite插件生态基于Rollup；Webpack插件更丰富。
        
        6. 如何配置 Vite 的 alias 和 proxy？
        【核心定义】路径映射与开发代理。
        【底层原理】alias简化导入路径；proxy将特定前缀请求转发至后端，解决开发跨域。
        【代码示例】
        resolve: { alias: { '@': path.resolve(__dirname, 'src') } }
        server: { proxy: { '/api': { target: 'http://localhost:3000', changeOrigin: true, rewrite: p => p.replace(/^/api/, '') } } }
        【注意事项】alias需配合TS paths配置；proxy仅开发环境有效；生产环境需Nginx配置代理。
        
        7. Vite 如何实现环境变量注入？
        【核心定义】按环境注入配置变量。
        【底层原理】读取.env系列文件，通过import.meta.env暴露，必须以VITE_前缀确保安全隔离。
        【代码示例】
        .env.production: VITE_APP_TITLE=生产环境
        console.log(import.meta.env.VITE_APP_TITLE);
        【注意事项】非VITE_前缀变量不注入前端；类型声明需写env.d.ts；生产构建时静态替换。
        
        8. Vite 的插件机制是什么？
        【核心定义】兼容Rollup插件接口，新增Vite特有钩子。
        【底层原理】插件导出对象包含name与钩子函数，config/configureServer/transformIndexHtml/handleHotUpdate等钩子介入不同阶段。
        【代码示例】
        export default function myPlugin() {
        return { name: 'vite-demo', transformIndexHtml(html) { return html.replace(/<title>.*?</title>/, '<title>Custom</title>'); } }
        }
        【注意事项】钩子执行顺序按插件数组顺序；configureServer可操作devServer实例；生产构建仅调用Rollup钩子。
        
        9. 生产环境为什么用 Rollup 打包？
        【核心定义】ESM生态成熟，优化彻底。
        【底层原理】Rollup Tree Shaking实现更彻底，输出格式灵活，插件体系稳定，适合应用与库打包。Vite底层深度集成Rollup4性能最佳。
        【代码示例】
        build: { rollupOptions: { output: { manualChunks: { vendor: ['react', 'react-dom'] } } } }
        【注意事项】manualChunks手动分割大依赖；注意CSS代码分割配置；生产构建默认压缩与混淆。
        
        10. 如何处理 CSS 预处理器和 PostCSS？
        【核心定义】内置支持与自动配置。
        【底层原理】安装sass/less/stylus即可直接使用；自动读取postcss.config.js；.module.css自动启用CSS Modules生成哈希类名。
        【代码示例】
        npm i sass -D
        .module.css 自动启用 :local(.title) { color: red; }
        【注意事项】预处理器版本需兼容；PostCSS autoprefixer自动加前缀；CSS Modules作用域隔离需规范命名。
        
        11. Vite 的依赖预构建缓存机制是什么？
        【核心定义】加速二次启动与请求优化。
        【底层原理】缓存位置node_modules/.vite，依赖package.json或vite.config.js变更时失效。include强制预构建，exclude跳过频繁变更包。
        【代码示例】
        optimizeDeps: { include: ['axios', 'lodash-es'], force: true }
        【注意事项】force:true强制重建缓存；大项目合理配置include减少扫描时间；CI环境需清理缓存防冲突。
        
        12. Vite 如何实现 SSR？
        【核心定义】服务端渲染支持。
        【底层原理】开发用vite.createServer转换模块，生产用Rollup打包SSR入口，支持流式渲染提升TTFB。框架Nuxt3已开箱即用。
        【代码示例】
        const vite = await createViteServer({ appType: 'custom' });
        const module = await vite.ssrLoadModule('/src/entry-server.js');
        【注意事项】SSR需处理浏览器API兼容性；水合一致性校验；流式渲染需Node18+支持。
        
        13. Vite 4/5 有什么新特性？
        【核心定义】性能与兼容性升级。
        【底层原理】基于Rollup4构建更快Tree Shaking更强；默认原生ESM优先；可选LightningCSS替代PostCSS速度提升百倍；HMR依赖追踪更精准。
        【代码示例】
        css: { transformer: 'lightningcss' } // 启用超高速CSS处理
        【注意事项】LightningCSS需注意语法兼容性；升级前检查插件支持情况；Node版本建议18+。
        
        九、Tailwind CSS
        1. Tailwind CSS 的核心设计理念是什么？
        【核心定义】Utility-First原子类构建UI。
        【底层原理】提供基础原子类组合构建界面，内置设计系统约束间距颜色断点，避免随意写值保证一致性，原子类语义明确无层叠冲突。
        【代码示例】
        <div class="flex items-center p-4 bg-white rounded-lg shadow-md">
        <span class="text-gray-700 font-medium">内容</span>
        </div>
        【注意事项】需转变传统CSS思维；类名组合需规范；配合IDE插件提升效率。

        2. 相比传统 CSS/预处理器有什么优缺点？
        【核心定义】开发模式与产物特征差异。
        【底层原理】优点：开发快无需命名切换文件，构建Purge移除未使用类体积极小；缺点：HTML类名冗长，动态样式需任意值语法，学习成本中等。
        【代码示例】
        传统: .card { padding: 1rem; background: #fff; border-radius: 0.5rem; }
        Tailwind: class="p-4 bg-white rounded-lg"
        【注意事项】团队需统一规范；复杂动画/媒体查询可混写传统CSS；避免过度使用@apply。
        
        3. 如何实现按需加载（Content 扫描）？
        【核心定义】构建时提取使用类名生成最小CSS。
        【底层原理】配置content路径扫描模板文件，提取类名生成最终CSS。动态拼接类名会被清除需加safelist。
        【代码示例】
        content: ['./src/**/*.{html,js,jsx,ts,tsx,vue}'],
        safelist: ['bg-red-500', 'text-lg'] // 动态类名白名单
        【注意事项】务必正确配置content路径防样式丢失；动态类名如bg-${color}-500需 safelist；生产构建自动Purge。
        
        4. 如何自定义主题（Theme）？
        【核心定义】扩展或覆盖默认设计令牌。
        【底层原理】theme.extend追加保留默认，直接写theme覆盖默认。支持颜色/间距/字体/断点自定义。
        【代码示例】
        theme: { extend: { colors: { primary: '#1DA1F2' }, spacing: { '128': '32rem' } } }
        【注意事项】extend追加不覆盖；直接替换theme会丢失默认值；自定义断点需同步响应式类生成。
        
        5. 如何实现响应式设计？
        【核心定义】移动优先断点前缀修饰。
        【底层原理】sm/md/lg/xl默认断点，前缀修饰类在对应视口生效。自定义断点修改theme.screens。
        【代码示例】
        <div class="w-full md:w-1/2 lg:w-1/3 p-2 md:p-4">响应式容器</div>
        【注意事项】默认移动优先；断点阈值可调整；复杂布局结合flex/grid原子类。

        6. 如何实现组件提取/复用？
        【核心定义】高频类组合抽象。
        【底层原理】@apply指令提取重复类到CSS文件；或封装为React/Vue组件内部使用Tailwind类。
        【代码示例】
        .btn-primary { @apply px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600; }
        【注意事项】避免过度@apply破坏原子化理念；组件封装更利于维护；@apply仅支持基础原子类不支持伪类嵌套。
        
        7. Tailwind 的 JIT 模式是什么？
        【核心定义】按需即时生成样式引擎。
        【底层原理】v3默认开启，扫描content实时生成类，支持任意值w-[350px]、全变体hover/focus/dark、构建极快无大小限制。
        【代码示例】
        class="w-[350px] bg-[#123456] hover:scale-105 dark:bg-gray-800"
        【注意事项】任意值语法灵活但难维护；优先用主题令牌；JIT模式内存占用低响应快。
        
        8. 如何与 CSS 预处理器结合？
        【核心定义】通常无需，按需注入。
        【底层原理】Tailwind内置PostCSS处理；若需Sass/Less通过@import引入基础层；@layer指令控制优先级。
        【代码示例】
        @layer components { .card { @apply p-4 rounded shadow; } }
        @layer utilities { .text-shadow { text-shadow: 0 1px 2px rgba(0,0,0,0.2); } }
        【注意事项】@layer base/components/utilities控制注入顺序；避免在组件层写全局重置；保持原子化优先。
        
        9. 如何解决 HTML 类名过长问题？
        【核心定义】工程化与工具辅助。
        【底层原理】IDE插件自动补全提示；prettier-plugin-tailwindcss自动排序；高频组合封装UI组件减少冗余。
        【代码示例】
        安装: Tailwind CSS IntelliSense, prettier-plugin-tailwindcss
        组件化: <Button variant="primary">提交</Button>
        【注意事项】自动排序提升可读性；组件抽象降低HTML臃肿；保持语义化标签结构。
        
        10. Tailwind 的性能如何？
        【核心定义】开发轻量生产极小。
        【底层原理】JIT按需生成内存低响应快；生产Purge后CSS通常<10KB零运行时开销；浏览器无需解析复杂选择器渲染最优。
        【代码示例】
        构建输出: dist/assets/index.css (4.2 KB)
        【注意事项】确保content配置准确防样式丢失；大项目可拆分CSS文件；配合HTTP/2多路复用加载极快。
        
        十、网络、HTTP 与安全
        1. HTTP/1.1、HTTP/2、HTTP/3 的核心区别是什么？
        【核心定义】协议层演进解决传输瓶颈。
        【底层原理】1.1 TCP持久连接但队头阻塞；2.0 二进制分帧多路复用头部压缩解决应用层阻塞；3.0 QUIC基于UDP 0-RTT建连解决传输层阻塞提升弱网体验。
        【代码示例】
        1.1: 文本协议 管道化受限
        2.0: 多路复用 服务器推送
        3.0: UDP基础 连接迁移 无队头阻塞
        【注意事项】升级需服务端/CDN支持；2.0必须HTTPS；3.0兼容性逐步提升中。
        
        2. TCP 三次握手和四次挥手的过程？
        【核心定义】可靠连接建立与断开机制。
        【底层原理】握手同步序列号防历史连接干扰；挥手双向关闭确保数据传完。TIME_WAIT 2MSL确保最后ACK到达。
        【代码示例】
        握手: SYN -> SYN+ACK -> ACK
        挥手: FIN -> ACK -> FIN -> ACK (TIME_WAIT 2MSL)
        【注意事项】大量TIME_WAIT需调优内核参数；挥手可能合并为三次（延迟ACK）；异常断开触发RST。
        
        3. HTTPS 的加密流程是什么？
        【核心定义】传输层安全加密协议。
        【底层原理】TLS握手协商算法版本，证书验证CA签名，非对称加密交换对称密钥，后续对称加密通信。防窃听篡改伪造。
        【代码示例】
        客户端Hello -> 服务端证书+ServerHello -> 密钥交换 -> ChangeCipherSpec -> 加密通信
        【注意事项】HSTS强制HTTPS防降级攻击；证书需定期续签；0-RTT需防重放攻击。
        
        4. 什么是跨域？如何解决？
        【核心定义】同源策略限制协议域名端口不同互访。
        【底层原理】安全隔离防恶意窃取数据。解决方案：CORS服务端设头、开发代理转发、postMessage跨域通信、WebSocket不受限。
        【代码示例】
        Access-Control-Allow-Origin: https://frontend.com
        Access-Control-Allow-Credentials: true
        【注意事项】简单请求直接发；复杂请求先发OPTIONS预检；凭证请求Origin不能为*。
        
        5. CORS 的简单请求和预检请求是什么？
        【核心定义】跨域请求分类与验证机制。
        【底层原理】简单请求GET/POST/HEAD+安全头直接发送；复杂请求PUT/DELETE/自定义头/带凭证先发OPTIONS验证权限。
        【代码示例】
        预检请求头: Access-Control-Request-Method: PUT
        预检请求头: Access-Control-Request-Headers: X-Custom-Header
        【注意事项】预检结果可缓存(Access-Control-Max-Age)；凭证请求需明确Origin；跨域Cookie需SameSite=None+Secure。
        
        6. 常见的 HTTP 状态码有哪些？
        【核心定义】服务器响应状态标识。
        【底层原理】2xx成功 3xx重定向/缓存 4xx客户端错误 5xx服务端错误。准确返回利于调试缓存与监控。
        【代码示例】
        200 OK / 201 Created / 204 No Content
        301 永久 / 302 临时 / 304 协商缓存命中
        400 参数错 / 401 未授权 / 403 禁止 / 404 未找到 / 429 限流
        500 内部错误 / 502 网关错 / 503 不可用 / 504 超时
        【注意事项】304无响应体省带宽；429需客户端重试退避；5xx触发降级熔断。
        
        7. 什么是 XSS 攻击？如何防御？
        【核心定义】跨站脚本注入恶意代码。
        【底层原理】反射型URL参数/存储型DB持久化/DOM型JS操作。防御靠输出转义、CSP限制来源、HttpOnly Cookie、富文本白名单过滤。
        【代码示例】
        Content-Security-Policy: default-src 'self'; script-src 'self' https://trusted.cdn.com
        DOMPurify.sanitize(userInput)
        【注意事项】框架默认转义但仍需警惕v-html/innerHTML；CSP report-only模式渐进上线；避免拼接HTML字符串。
        
        8. 什么是 CSRF 攻击？如何防御？
        【核心定义】跨站请求伪造利用已登录状态。
        【底层原理】诱导点击恶意链接伪造请求。防御：SameSite Cookie限制携带、CSRF Token验证、Referer/Origin校验、关键操作二次确认。
        【代码示例】
        Set-Cookie: token=abc; SameSite=Lax; Secure
        <input type="hidden" name="_csrf" value="random_token">
        【注意事项】GET请求不应有副作用；Token需随机且一次性；Referer可被禁用需组合防御。

        9. 什么是点击劫持（Clickjacking）？如何防御？
        【核心定义】透明iframe诱导点击隐藏按钮。
        【底层原理】覆盖正常页面诱导操作。防御：X-Frame-Options DENY/SAMEORIGIN、CSP frame-ancestors、JS顶层跳转检测。
        【代码示例】
        X-Frame-Options: DENY
        Content-Security-Policy: frame-ancestors 'self'
        if (window.top !== window.self) window.top.location = window.self.location;
        【注意事项】JS防御可被禁用；优先服务端响应头；第三方嵌入需明确授权域。
        
        10. Cookie 的 SameSite 属性有哪些值？
        【核心定义】跨站请求Cookie携带策略。
        【底层原理】Strict仅同源；Lax允许GET跳转携带推荐默认；None允许跨站必须配Secure。防CSRF核心机制。
        【代码示例】
        Set-Cookie: session=abc; SameSite=Strict
        Set-Cookie: session=abc; SameSite=None; Secure
        【注意事项】Lax平衡安全与体验；None必须HTTPS；老浏览器不支持默认Lax行为。
        
        11. 什么是中间人攻击（MITM）？如何防范？
        【核心定义】拦截通信窃听篡改数据。
        【底层原理】攻击者伪装节点拦截流量。防范：强制HTTPS+HSTS、证书锁定、安全网络环境、接口签名校验。
        【代码示例】
        Strict-Transport-Security: max-age=31536000; includeSubDomains
        证书锁定: Certificate Pinning 绑定公钥哈希
        【注意事项】公共WiFi高风险；HSTS预加载列表防首次HTTP；签名防重放需加时间戳。
        
        12. WebSocket 和 HTTP 的区别？
        【核心定义】通信模型与协议特征差异。
        【底层原理】HTTP请求响应半双工头部大；WebSocket长连接全双工轻量帧结构，基于HTTP升级独立协议，适合实时通信。
        【代码示例】
        ws = new WebSocket('wss://api.example.com');
        ws.onmessage = e => console.log(e.data);
        ws.send(JSON.stringify({type:'ping'}));
        【注意事项】需处理断线重连与心跳；防火墙可能拦截WS端口；生产环境用wss加密。
        
        13. 前端如何安全地存储敏感数据？
        【核心定义】防窃取防泄露存储策略。
        【底层原理】禁localStorage存Token密码（XSS可窃取）；登录态用HttpOnly+Secure+SameSite Cookie；短期数据存内存；加密存储复杂需谨慎。
        【代码示例】
        登录: HttpOnly Cookie 短期有效 + 刷新机制
        敏感操作: 二次验证(短信/密码)
        内存: let sensitiveData = null; // 页面刷新丢失
        【注意事项】Token分访问令牌与刷新令牌；刷新令牌严格HttpOnly；定期轮换密钥；避免前端解密敏感信息。
        
        十一、性能优化与前端工程化
        1. 如何衡量前端性能？核心指标有哪些？
        【核心定义】量化用户体验与加载效率。
        【底层原理】Core Web Vitals：LCP≤2.5s最大内容渲染、INP≤200ms交互延迟、CLS≤0.1视觉稳定。传统指标FCP/TTI/TTFB辅助分析。
        【代码示例】
        import { onLCP, onINP, onCLS } from 'web-vitals';
        onLCP(metric => sendToAnalytics(metric));
        【注意事项】指标需结合业务场景；实验室数据(Lighthouse)与真实用户数据(RUM)结合；设置阈值告警。
        
        2. 首屏加载优化有哪些核心手段？
        【核心定义】减少用户看到可交互页面的时间。
        【底层原理】资源层压缩懒加载/关键CSS内联/JS defer；加载策略预连接预加载；架构层SSR/流式渲染；网络层CDN/HTTP2/缓存。
        【代码示例】
        <link rel="preconnect" href="https://cdn.com">
        <style>/* 关键CSS */</style>
        <script src="app.js" defer></script>
        【注意事项】优先级排序：关键资源>非关键；避免过度内联增大HTML；CDN就近加速；压缩启用Brotli。

        3. 如何做运行时性能监控（RUM）？
        【核心定义】采集真实用户性能数据持续优化。
        【底层原理】Web Vitals库采集指标，navigator.sendBeacon可靠上报，结合错误监控关联环境，建立看板分析趋势。
        【代码示例】
        navigator.sendBeacon('/api/perf', JSON.stringify({name:metric.name, value:metric.value, ua:navigator.userAgent}));
        【注意事项】Beacon异步不阻塞页面；采样上报控制成本；关联用户ID/页面/网络类型；定期复盘优化。
        
        4. 什么是 CI/CD？前端如何落地？
        【核心定义】持续集成部署自动化流水线。
        【底层原理】代码提交触发Lint/Test/Build，失败拦截；产物上传CDN/服务器，环境隔离，自动回滚，版本化管理。
        【代码示例】
        GitHub Actions: on: [push] -> steps: checkout, setup-node, npm ci, npm run lint, npm run build, deploy
        【注意事项】锁版本依赖防意外；构建缓存加速；多环境配置分离；失败自动通知；保留历史产物防回滚失败。
        
        5. 如何做代码质量管控？
        【核心定义】规范代码风格与潜在错误。
        【底层原理】ESLint/Stylelint静态检查，Prettier格式化，Husky+lint-staged提交拦截，SonarQube扫描复杂度漏洞，PR评审与测试覆盖门禁。
        【代码示例】
        husky: pre-commit -> lint-staged: "*.{js,ts}" -> eslint --fix
        sonarqube: 覆盖率阈值≥80% 阻断合并
        【注意事项】规则需团队共识；自动修复提升体验；复杂逻辑加注释；定期清理技术债。
        
        6. 前端如何进行依赖管理优化？
        【核心定义】高效安全安装与管理第三方包。
        【底层原理】pnpm硬链接节省磁盘70%安装快；lock文件锁定版本；audit扫描漏洞；按需引入减小体积。
        【代码示例】
        pnpm install
        npm audit fix
        import { debounce } from 'lodash-es'; // 按需
        【注意事项】定期更新补丁版本；大库替换轻量替代(dayjs/moment)；避免全量引入；生产依赖与开发依赖分离。
        
        7. 什么是微前端？主流方案对比？
        【核心定义】大型应用拆分为独立开发部署子应用。
        【底层原理】qiankun沙箱隔离成熟稳定；Module Federation运行时共享依赖；单SPA路由分发简单耦合；iframe完全隔离体验差。按需选型。
        【代码示例】
        qiankun: registerMicroApps([{name:'app1', entry:'//localhost:7100', container:'#subapp', activeRule:'/app1'}])
        【注意事项】样式隔离CSS Modules/Shadow DOM；JS沙箱Proxy隔离window；通信props/customEvent；避免过度拆分。
        
        8. 如何做前端安全扫描与防护？
        【核心定义】全链路漏洞发现与拦截。
        【底层原理】SAST静态分析代码，SCA扫描依赖漏洞，DAST动态渗透测试，部署CSP/X-Frame头/WAF拦截，CI集成阻断高危。
        【代码示例】
        npm audit --audit-level=high
        CSP: Content-Security-Policy: default-src 'self'
        CI: snyk test -> fail on high vulnerability
        【注意事项】定期渗透测试；WAF防SQL注入/XSS；依赖锁定防供应链攻击；安全左移开发阶段修复。
        
        9. 如何优化构建产物体积？
        【核心定义】减少下载与解析开销。
        【底层原理】分析工具可视化依赖，Tree Shaking去死代码，SplitChunks提公共，压缩资源，替换大库，动态导入路由组件。
        【代码示例】
        webpack-bundle-analyzer
        optimization: { splitChunks: { chunks: 'all', minSize: 20000 } }
        const Page = lazy(() => import('./Page'));
        【注意事项】按需加载防首屏过大；图片压缩转WebP；字体子集化；定期审计移除废弃依赖。
        
        10. 什么是设计系统（Design System）？前端如何落地？
        【核心定义】统一设计语言与组件规范。
        【底层原理】设计Token同步代码，组件库Storybook文档测试，CSS变量主题切换，自动化视觉回归对比。
        【代码示例】
        Style Dictionary -> tokens.json -> CSS Variables
        <Button variant="primary" size="md">提交</Button>
        【注意事项】Token驱动保证一致性；组件原子化组合；视觉回归防样式破坏；文档即代码同步更新。
        
        11. 前端如何做国际化（i18n）？
        【核心定义】多语言适配与区域格式化。
        【底层原理】方案react-i18next/vue-i18n，流程文案抽离动态加载，格式化日期数字货币按Locale，RTL布局支持。
        【代码示例】
        {t('welcome.message', {name: 'Alice'})}
        new Intl.DateTimeFormat('zh-CN').format(date)
        【注意事项】文案与代码分离；翻译平台集成；避免机翻直上；RTL语言需镜像布局；复数规则复杂需专用语法。
        
        12. 什么是 Monorepo？前端为什么用它？
        【核心定义】单仓库管理多包/应用。
        【底层原理】pnpm workspace/Turborepo/Nx管理，依赖共享避免重复，原子提交跨包一致，统一CI/CD规范，简化内部引用。
        【代码示例】
        pnpm-workspace.yaml: packages: - 'packages/' - 'apps/'
        turborepo run build --filter=apps/web...
        【注意事项】适合中大型团队；配置复杂度略高；缓存策略提升构建速度；权限管理需细化。
        
        13. 前端如何做灰度发布？
        【核心定义】逐步放量验证新功能稳定性。
        【底层原理】流量按比例分流，特性开关控制代码路径，渐进放量监控指标，快速回滚保障稳定。
        【代码示例】
        if (featureFlags.newUI) renderNewUI();
        Nginx: split_clients $cookie_gray $upstream { 10% gray_backend; 90% stable_backend; }
        【注意事项】开关配置中心动态下发；监控错误率/性能指标；回滚一键切换；用户分组需稳定哈希。
        
        14. 性能预算（Performance Budget）是什么？
        【核心定义】关键指标阈值自动化检查。
        【底层原理】设定资源大小与时间预算，CI集成检查超标阻断合并，定期回顾调整目标，防性能退化。
        【代码示例】
        budgets: [{resourceType:'script', budget:200}, {metric:'lcp', budget:2500}]
        webpack-perf-budget-plugin -> fail build if exceeded
        【注意事项】预算值基于真实用户数据；区分环境设置；与业务目标对齐；定期复盘调整阈值。
        
        十二、前端必备综合知识点
        1. 什么是 RESTful API？设计原则是什么？
        【核心定义】资源导向的架构风格。
        【底层原理】统一接口GET查POST增PUT全改PATCH局改DELETE删，无状态每次请求含完整上下文，名词复数命名，规范状态码，版本控制路径或Header。
        【代码示例】
        GET /api/users/123
        POST /api/users {name:'Alice'}
        200 OK / 201 Created / 400 Bad Request / 404 Not Found
        【注意事项】避免动词URL；幂等性设计PUT/DELETE；分页用limit/offset或cursor；版本演进向前兼容。
        
        2. GraphQL 相比 REST 有什么优缺点？
        【核心定义】查询语言与运行时对比传统接口。
        【底层原理】客户端按需声明字段单次获取关联数据，缓存复杂需Apollo/Relay，学习成本高适合复杂关联多端适配；REST缓存简单成本低适合基础CRUD。
        【代码示例】
        query { user(id: 123) { name posts { title } } }
        【注意事项】防深度查询DoS需限深/限复杂度；缓存策略需设计；适合数据关系复杂场景；简单接口REST更高效。
        
        3. 什么是 BFF（Backend for Frontend）？
        【核心定义】前端定制后端聚合层。
        【底层原理】裁剪组装转换数据，降低前端复杂度避免多次请求，适配多端格式，解耦核心业务与展示层。技术栈Node.js/GraphQL/Serverless。
        【代码示例】
        app.get('/api/dashboard', async (req, res) => {
        const [user, orders, notifications] = await Promise.all([fetchUser(), fetchOrders(), fetchNotifs()]);
        res.json({ user, recentOrders: orders.slice(0,5), unread: notifications.length });
        });
        【注意事项】BFF需维护与业务服务同步；缓存策略防后端压力；适合中大型多端项目；小项目直接调微服务。
        
        4. 前端如何进行技术选型？
        【核心定义】评估框架工具库的决策过程。
        【底层原理】评估团队熟悉度、项目规模性能要求、生态活跃度维护状态、体积性能基准、学习成本迁移风险。原则业务适合优先核心求稳边缘尝鲜。
        【代码示例】
        评估矩阵: 性能(30%) + 生态(25%) + 团队(20%) + 维护(15%) + 成本(10%)
        【注意事项】不盲目追新；POC验证关键场景；社区Issue响应速度重要；核心依赖选LTS版本。
        
        5. 如何设计一个可扩展的前端架构？
        【核心定义】模块化高内聚低耦合系统。
        【底层原理】分层视图状态网络工具，按功能领域拆分，配置驱动减少硬编码，约定规范统一，内置日志监控埋点可观测。
        【代码示例】
        src/
        components/ (UI)
        stores/ (状态)
        services/ (API)
        utils/ (工具)
        router/ (路由)
        【注意事项】避免循环依赖；接口契约先行；错误边界统一处理；定期重构清理债务；文档同步更新。
        
        6. 什么是低代码/无代码平台？核心原理是什么？
        【核心定义】可视化搭建动态生成应用。
        【底层原理】可视化生成JSON Schema元数据，渲染引擎解析动态生成UI逻辑，模块含物料市场画布编辑器渲染器逻辑编排发布部署。适合标准化场景。
        【代码示例】
        Schema: { type:'page', children:[{type:'form', fields:[{name:'title',type:'input'}]}] }
        Renderer: parse(schema) -> createDOM() -> bindEvents()
        【注意事项】复杂交互仍需手写；物料标准化是关键；版本管理与回滚必备；性能优化防大Schema卡顿。
        
        7. 前端如何做权限控制？
        【核心定义】多粒度访问控制机制。
        【底层原理】路由级动态表+守卫拦截，组件级条件渲染，按钮级指令控制，数据级过滤脱敏。多端校验后端最终鉴权。
        【代码示例】
        路由: meta:{roles:['admin']} -> beforeEach拦截
        按钮: v-permission="'user:delete'"
        数据: response.data.filter(item => item.visible)
        【注意事项】权限数据存Store集中管理；后端必须二次校验；细粒度权限缓存防频繁请求；离职/改权实时生效。
        
        8. 什么是 SSR/SSG/ISR？适用场景？
        【核心定义】服务端渲染策略差异。
        【底层原理】SSR每次请求渲染实时数据SEO友好但服务器压力大；SSG构建时静态生成性能极致但更新需重建；ISR定时按需增量重建兼顾性能与更新。
        【代码示例】
        Next.js: getServerSideProps (SSR) / getStaticProps (SSG) / revalidate: 60 (ISR)
        【注意事项】SSR注意水合一致；SSG适合博客文档营销页；ISR缓存策略需严谨；边缘SSR降低TTFB。
        
        9. 前端如何排查线上白屏问题？
        【核心定义】快速定位渲染失败根因。
        【底层原理】查控制台JS报错语法未捕获异常，查Network请求404/500接口失败，查兼容性低版本浏览器Polyfill缺失，查构建publicPath/Hash匹配，查CDN域名解析证书。
        【代码示例】
        window.onerror = (msg, url, line) => sendError({msg, url, line, stack: event.error?.stack});
        Source Map还原 -> Sentry追踪 -> Lighthouse分析
        【注意事项】生产开启错误监控；Source Map仅上传监控平台；降级策略防核心库失败；灰度发布缩小影响面。
        
        10. 什么是 PWA？核心特性有哪些？
        【核心定义】渐进式Web应用原生体验。
        【底层原理】可安装主屏幕独立窗口，离线Service Worker缓存，Web Push推送，响应式安全HTTPS，URL分享可索引。manifest+SW+HTTPS实现。
        【代码示例】
        manifest.json: {name, short_name, icons, start_url, display:'standalone'}
        sw.js: caches.open('v1').then(c => c.addAll(['/','/app.js']))
        【注意事项】iOS支持有限；推送需用户授权；缓存策略需版本管理；Lighthouse≥90分认证。
        
        11. 前端如何进行兼容性处理？
        【核心定义】多浏览器环境适配策略。
        【底层原理】Babel转译JS语法，PostCSS处理CSS降级，core-js按需Polyfill，渐进增强基础全兼容高级优雅降级，自动化多端验证，数据驱动支持范围。
        【代码示例】
        browserslist: "> 0.5%, last 2 versions, not dead"
        @babel/preset-env: useBuiltIns: 'usage', corejs: 3
        【注意事项】避免过度Polyfill增大体积；CSS autoprefixer自动加前缀；真机测试关键路径；老旧浏览器降级提示。
        
        12. 什么是 Web Components？核心 API 是什么？
        【核心定义】浏览器原生组件标准。
        【底层原理】Custom Elements定义自定义标签，Shadow DOM样式结构隔离，HTML Templates声明复用结构，Slots内容分发。不依赖框架跨平台。
