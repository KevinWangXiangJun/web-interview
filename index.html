        【代码示例】
        class MyComp extends HTMLElement {
        constructor() { super(); this.attachShadow({mode:'open'}).innerHTML = '<slot></slot>'; }
        }
        customElements.define('my-comp', MyComp);
        【注意事项】适合设计系统底层/微前端强隔离；框架集成需适配；Shadow DOM样式穿透用::part；注意生命周期兼容性。
        
        13. 前端如何进行代码重构？
        【核心定义】改进内部结构不改变外部行为。
        【底层原理】小步快跑测试保障，识别坏味道重复/过长/过大/硬编码，渐进提取改善命名消除分支引入模式，每次验证行为不变。
        【代码示例】
        提取函数 -> 改善命名 -> 消除重复 -> 引入策略模式 -> 运行测试
        AST转换: jscodeshift 自动化重命名/迁移
        【注意事项】必须有测试安全网；单次改动范围小；先写测试再重构；利用IDE重构功能；定期技术债清理。
        
        14. 什么是 Edge Computing（边缘计算）在前端的应用？
        【核心定义】CDN边缘节点执行逻辑降延迟。
        【底层原理】Edge SSR/缓存个性化内容/安全过滤WAF/Bot防护，全球就近响应TTFB降低50%+减轻源站压力。Cloudflare Workers/Vercel Edge实现。
        【代码示例】
        addEventListener('fetch', event => {
        event.respondWith(fetch(event.request).then(res => {
        const newRes = new Response(res.body, res);
        newRes.headers.set('X-Edge', 'true');
        return newRes;
        }));
        });
        【注意事项】边缘环境限制Node API；状态需外部存储；缓存键设计防污染；适合读多写少场景。
        
        15. 前端工程师的核心竞争力是什么？
        【核心定义】技术深度与业务价值融合。
        【底层原理】全链路工程化掌控构建部署监控自动化，指标驱动性能优化定位瓶颈落地，模块化架构思维平衡业务技术，技术驱动业务增长，持续学习跟进标准输出分享。
        【代码示例】
        能力模型: 工程化(30%) + 性能优化(25%) + 架构设计(20%) + 业务落地(15%) + 学习分享(10%)
        【注意事项】避免纯技术自嗨；深入理解业务指标；建立技术影响力文档/开源/内部分享；保持好奇心与实践力。
    </textarea>

    <!-- 左侧固定边栏 -->
    <aside id="sidebar" class="bg-[#1e2329] text-gray-300 w-80 flex-shrink-0 fixed inset-y-0 left-0 z-50 md:relative md:translate-x-0 sidebar sidebar-hidden md:flex flex-col transition-transform duration-300 ease-in-out shadow-xl">
        <!-- 面板头部 -->
        <div class="p-6 bg-[#161a1f] flex justify-between items-center border-b border-[#2d333b]">

            <button id="close-sidebar" class="md:hidden text-gray-400 hover:text-white focus:outline-none">

        <!-- 统计面板区 -->

                 <input type="text" id="search-input" placeholder="搜索题目..." class="w-full bg-[#161a1f] text-sm text-gray-300 pl-4 pr-10 py-2.5 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 border border-[#2d333b]">
                 <svg class="w-4 h-4 text-gray-500 absolute right-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>

        <!-- 手机端悬浮小Top栏 -->

        <!-- 滑动到顶部按钮 -->

            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 16 16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
        </button>

    <!-- JS Core -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // === 1. 修复后的核心解析引擎 ===
            const rawText = document.getElementById('raw-data').value;
            const lines = rawText.split('\n');
            
            const dataConfig = [];
            let currentCategory = null;
            let currentQuestion = null;
            let currentBlock = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const trimmed = line.trim();
                // 过滤掉完全空白的行
                if (!trimmed) continue;

                // 判断大板块标题，匹配诸如 "一、HTML 与浏览器"
                if (/^[一二三四五六七八九十十一十二]+、/.test(trimmed)) {
                    currentCategory = { 
                        id: 'cat-' + dataConfig.length, 
                        title: trimmed, 
                        questions: [] 
                    };
                    dataConfig.push(currentCategory);
                    currentQuestion = null;
                    currentBlock = null;
                } 
                // 捕获带有标识符的前缀行
                else if (trimmed.startsWith('【核心定义】')) {
                    currentBlock = 'definition';
                    if (currentQuestion) currentQuestion.definition = trimmed.replace(/^【核心定义】\s*/, '');
                }
                else if (trimmed.startsWith('【底层原理】')) {
                    currentBlock = 'principle';
                    if (currentQuestion) currentQuestion.principle = trimmed.replace(/^【底层原理】\s*/, '');
                }
                else if (trimmed.startsWith('【代码示例】')) {
                    currentBlock = 'code';
                    if (currentQuestion) {
                        currentQuestion.codeObj = [];
                        const content = trimmed.replace(/^【代码示例】\s*/, '');
                        if (content) currentQuestion.codeObj.push(content);
                    }
                }
                else if (trimmed.startsWith('【注意事项】')) {
                    currentBlock = 'notes';
                    if (currentQuestion) currentQuestion.notes = trimmed.replace(/^【注意事项】\s*/, '');
                }
                // 未匹配到上述情况（可能是新题目标题，或者是代码块的中间部分）
                else {
                    if (currentBlock === 'code') {
                        // 保留前方缩进，直接存入代码部分
                        if (currentQuestion) currentQuestion.codeObj.push(line);
                    } else if (trimmed.startsWith('---') || trimmed.startsWith('##')) {
                        // 忽略 Markdown 里多出的分隔符
                    } else {
                        // 不带【开头，说明它是全新的下一道题目标题！
                        currentQuestion = { 
                            id: 'q-' + Math.random().toString(36).substr(2, 9), 
                            title: trimmed.replace(/^\d+\.\s*/, '') 
                        };
                        if (currentCategory) {
                            currentCategory.questions.push(currentQuestion);
                        }
                        // ★ 核心修复：一旦进入新题目，重置 block 指向，防止与上一题错乱合并
                        currentBlock = null;
                    }
                }
            }

            // === 2. UI 渲染引擎 ===
            const navMenu = document.getElementById('nav-menu');
            const mainContent = document.getElementById('main-content');
            let totalQuestions = 0;

            dataConfig.forEach((category, catIndex) => {
                totalQuestions += category.questions.length;
                
                // --------- 渲染左侧的折叠目录 ---------
                const catDiv = document.createElement('div');
                catDiv.className = 'w-full mb-1 isolate';
                
                const catHeaderBtn = document.createElement('button');
                catHeaderBtn.className = 'w-full text-left px-3 py-3 rounded-md flex justify-between items-center text-gray-300 hover:bg-[#2d333b] hover:text-white transition-all focus:outline-none focus:ring-1 focus:ring-blue-500';
                
                const cleanCatName = category.title.replace(/（\d+题）/g, '');
                catHeaderBtn.innerHTML = `
                    <span class="font-bold text-sm truncate flex-1">${cleanCatName} <span class="text-xs text-gray-500 ml-1 font-normal">(${category.questions.length})</span></span>
                    <svg class="w-4 h-4 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                `;
                
                const questionsList = document.createElement('div');
                const isCatCollapsed = catIndex !== 0;
                questionsList.className = `nav-content pl-2 pr-1 my-1 space-y-0.5 border-l border-gray-700 ml-4 ${isCatCollapsed ? 'collapsed' : ''}`;
                if(!isCatCollapsed) catHeaderBtn.querySelector('svg').classList.add('rotate-180');
                
                category.questions.forEach((q, index) => {
                    const qLink = document.createElement('a');
                    qLink.href = `#${q.id}`;
                    qLink.className = 'block px-3 py-2 rounded-md text-[13px] text-gray-400 hover:text-white hover:bg-blue-600 transition-colors truncate tracking-wide';
                    qLink.innerText = `${index + 1}. ${q.title}`;
                    
                    qLink.addEventListener('click', () => {
                        if (window.innerWidth < 768) toggleSidebar(false);
                    });
                    questionsList.appendChild(qLink);
                });

                catHeaderBtn.addEventListener('click', () => {
                    const svgIcon = catHeaderBtn.querySelector('svg');
                    if (questionsList.classList.contains('collapsed')) {
                        questionsList.classList.remove('collapsed');
                        svgIcon.classList.add('rotate-180');
                    } else {
                        questionsList.classList.add('collapsed');
                        svgIcon.classList.remove('rotate-180');
                    }
                });

                catDiv.appendChild(catHeaderBtn);
                catDiv.appendChild(questionsList);
                navMenu.appendChild(catDiv);

                // --------- 渲染右侧内容 ---------
                const contentSection = document.createElement('div');
                contentSection.className = 'bg-white rounded-xl shadow-[0_2px_10px_rgba(0,0,0,0.04)] mb-8 border border-gray-100';
                
                const sectionHeader = document.createElement('div');
                sectionHeader.className = 'bg-[#fcfdfd] border-b border-gray-100 px-6 py-5 cursor-pointer flex justify-between items-center rounded-t-xl hover:bg-gray-50 transition-colors';
                sectionHeader.innerHTML = `
                    <h2 class="text-xl font-black text-gray-800">${category.title}</h2>
                    <span class="text-blue-600 text-sm font-medium bg-blue-50 px-3 py-1 rounded-full">${category.questions.length} 道考题</span>
                `;
                
                const sectionBody = document.createElement('div');
                sectionBody.className = 'px-6 md:px-10 py-6';

                category.questions.forEach((q, index) => {
                    const qDiv = document.createElement('div');
                    qDiv.id = q.id;
                    qDiv.className = 'question-item scroll-mt-24 md:scroll-mt-10 group';
                    
                    let html = `<h3 class="text-lg md:text-xl font-bold text-gray-800 mb-5 leading-tight flex items-start">
                        <span class="mr-3 mt-0.5 text-blue-600">Q${index + 1}.</span> 
                        <span class="flex-1">${q.title}</span>
                    </h3>`;

                    if(q.definition) {
                        html += `<div class="mb-4 leading-7">
                            <span class="inline-block px-2.5 py-1 rounded text-[13px] font-bold bg-blue-100 text-blue-700 mr-2 mb-1 shadow-sm">核心定义</span> 
                            <span class="text-[#374151]">${q.definition}</span>
                        </div>`;
                    }
                    
                    if(q.principle) {
                        html += `<div class="mb-4 leading-7">
                            <span class="inline-block px-2.5 py-1 rounded text-[13px] font-bold bg-purple-100 text-purple-700 mr-2 mb-1 shadow-sm">底层原理</span> 
                            <span class="text-[#374151]">${q.principle}</span>
                        </div>`;
                    }

                    if(q.codeObj && q.codeObj.length > 0) {
                        const sanitizedCode = q.codeObj.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        html += `<div class="mb-4">
                            <span class="inline-block px-2.5 py-1 rounded text-[13px] font-bold bg-gray-200 text-gray-700 mr-2 mb-2 shadow-sm">代码示例</span> 
                            <pre class="bg-[#1e293b] text-[#d4d4d4] p-4 rounded-lg overflow-x-auto max-w-full text-[14px] font-mono whitespace-pre-wrap shadow-inner border border-[#333] border-l-[3px] border-l-blue-500"><code>${sanitizedCode}</code></pre>
                        </div>`;
                    }

                    if(q.notes) {
                        html += `<div class="mb-2 leading-7">
                            <span class="inline-block px-2.5 py-1 rounded text-[13px] font-bold bg-amber-100 text-amber-700 mr-2 mb-1 shadow-sm">注意事项</span> 
                            <span class="text-[#374151]">${q.notes}</span>
                        </div>`;
                    }

                    qDiv.innerHTML = html;
                    sectionBody.appendChild(qDiv);
                });

                sectionHeader.addEventListener('click', () => {
                    sectionBody.style.display = sectionBody.style.display === 'none' ? 'block' : 'none';
                });

                contentSection.appendChild(sectionHeader);
                contentSection.appendChild(sectionBody);
                mainContent.appendChild(contentSection);
            });

            document.getElementById('stat-categories').innerText = dataConfig.length;
            document.getElementById('stat-questions').innerText = totalQuestions;

            // === 3. 功能绑定事件 ===
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase().trim();
                const allSections = navMenu.querySelectorAll('div.isolate');
                
                allSections.forEach(section => {
                    const links = section.querySelectorAll('a');
                    let sectionHasMatch = false;

                    links.forEach(link => {
                        if (link.innerText.toLowerCase().includes(val)) {
                            link.style.display = 'block';
                            sectionHasMatch = true;
                        } else {
                            link.style.display = 'none';
                        }
                    });

                    if (val && sectionHasMatch) {
                        const content = section.querySelector('.nav-content');
                        const icon = section.querySelector('svg');
                        content.classList.remove('collapsed');
                        icon.classList.add('rotate-180');
                    }
                });
            });

            // 手机抽屉
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const openBtn = document.getElementById('open-sidebar');
            const closeBtn = document.getElementById('close-sidebar');

            function toggleSidebar(show) {
                if (show) {
                    sidebar.classList.remove('sidebar-hidden');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('sidebar-hidden');
                    overlay.classList.add('hidden');
                }
            }

            openBtn.addEventListener('click', () => toggleSidebar(true));
            closeBtn.addEventListener('click', () => toggleSidebar(false));
            overlay.addEventListener('click', () => toggleSidebar(false));

            // 返回最上方
            const mainScrollEl = document.getElementById('main-scroll');
            const backToTopBtn = document.getElementById('back-to-top');

            mainScrollEl.addEventListener('scroll', () => {
                if (mainScrollEl.scrollTop > 400) {
                    backToTopBtn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                    backToTopBtn.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0');
                } else {
                    backToTopBtn.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
                    backToTopBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                }
            });

            backToTopBtn.addEventListener('click', () => {
                mainScrollEl.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // 监听全局或侧边栏的点击事件，拦截原生的 a 标签锚点跳转
            document.addEventListener('click', (e) => {
                // 确保点击的是带锚点的链接（通常是左侧导航）
                const link = e.target.closest('a');
                if (!link) return;
                
                const href = link.getAttribute('href');
                // 如果是内部锚点跳转 (例如 href="#question-1")
                if (href && href.startsWith('#') && href.length > 1) {
                    const targetId = href.substring(1);
                    const targetEl = document.getElementById(targetId);
                    
                    if (targetEl) {
                        e.preventDefault(); // 阻止浏览器瞬间跳转，由我们接管
                        
                        // 1. 适配：如果您使用原生 <details> 标签折叠
                        const detailsContainer = targetEl.closest('details');
                        if (detailsContainer && !detailsContainer.open) {
                            detailsContainer.open = true;
                        }
                        
                        // 2. 适配：如果您使用 Div 配合 Tailwind CSS (如 'hidden') 控制折叠
                        let node = targetEl;
                        while (node && node !== document.body) {
                            // 检查沿途的父容器是否被隐藏，如果是，则移除 hidden 类
                            if (node.classList.contains('hidden')) {
                                node.classList.remove('hidden');
                                
                                // 【可选】由于强制移除了 hidden，这里可以顺便触发一下可能存在的状态更新开关
                                // 以确保右侧原本控制折叠的箭头图标方向也能同步变更
                                const siblingBtn = node.previousElementSibling;
                                if (siblingBtn && siblingBtn.tagName === 'DIV' || siblingBtn?.tagName === 'BUTTON') {
                                    // 模拟点击一次开关使其内部状态同步（如果有独立状态的话），但要注意防止死循环
                                }
                            }
                            if (node.style.display === 'none') {
                                node.style.display = 'block';
                            }
                            node = node.parentElement;
                        }
                        
                        // 3. 待 DOM 渲染（展开）完毕后，平滑滚动至题目位置
                        requestAnimationFrame(() => {
                            setTimeout(() => {
                                targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                                
                                // 4. (额外优化) 给当前定位的题目加一个醒目的背景高亮，提示用户定位到了这里
                                const originalBg = targetEl.style.backgroundColor;
                                targetEl.style.transition = 'background-color 0.8s ease';
                                targetEl.style.backgroundColor = '#fef08a'; // Tailwind yellow-200 颜色
                                setTimeout(() => {
                                    targetEl.style.backgroundColor = originalBg || 'transparent';
                                }, 1200);

                            }, 50); // 略微延时，确保隐藏容器彻底展开后计算的高度是准确的
                        });
                    }
                }
            });
        });
    </script>
